<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Scroll — Learn Coding</title>
  <link rel="stylesheet" href="/assets/base.css">
  <link rel="stylesheet" href="/assets/shell.css">
  <style>
    /* ─── FEED HERO ─── */
    .feed-hero {
      max-width: 680px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 0;
    }
    .feed-hero h1 {
      font-family: var(--serif);
      font-size: 2.8rem;
      font-weight: 400;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.35rem;
    }
    .feed-hero .subtitle {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      transition: all 0.3s var(--ease-out-expo);
    }

    /* ─── FILTER TABS ─── */
    .feed-filters {
      max-width: 680px;
      margin: 0 auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 60px;
      z-index: 90;
      background: var(--header-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .filter-tab {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .filter-tab:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }
    .filter-tab.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .filter-tab[data-track="d3"].active { background: var(--accent-d3); border-color: var(--accent-d3); color: #000; }
    .filter-tab[data-track="django"].active { background: var(--accent-django); border-color: var(--accent-django); color: #000; }
    .filter-tab[data-track="sql"].active { background: var(--accent-sql); border-color: var(--accent-sql); color: #fff; }
    .filter-tab[data-track="jsts"].active { background: var(--accent-jsts); border-color: var(--accent-jsts); color: #000; }
    .filter-tab[data-track="react"].active { background: var(--accent-react); border-color: var(--accent-react); color: #000; }
    .filter-tab[data-track="css"].active { background: var(--accent-css); border-color: var(--accent-css); color: #fff; }
    .filter-tab[data-track="ai"].active { background: var(--accent-ai); border-color: var(--accent-ai); color: #000; }

    .refresh-btn {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      padding: 0.45rem 0.85rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }
    .refresh-btn:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }
    .refresh-btn svg {
      width: 14px;
      height: 14px;
      transition: transform 0.4s var(--ease-out-expo);
    }
    .refresh-btn.spinning svg {
      transform: rotate(360deg);
    }

    /* ─── FEED COLUMN ─── */
    .feed-column {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ─── POST ─── */
    .post {
      position: relative;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }
    .post:hover { background: var(--surface-2); }
    .post-track-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 2px;
      height: 100%;
      opacity: 0.3;
    }
    .post-inner {
      display: flex;
      gap: 0.75rem;
      padding: 1.25rem 1.5rem;
    }
    .post-avatar {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      border: 1px solid;
    }
    .post-body {
      flex: 1;
      min-width: 0;
    }
    .post-header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 0.15rem;
    }
    .post-name {
      font-weight: 600;
      font-size: 0.88rem;
    }
    .post-badge {
      font-family: var(--mono);
      font-size: 0.5rem;
      letter-spacing: 0.08em;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      color: #000;
      font-weight: 600;
    }
    .post-handle {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .post-dot {
      color: var(--text-muted);
      font-size: 0.75rem;
    }
    .post-time {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .post-type {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .post-content {
      font-size: 0.92rem;
      line-height: 1.65;
      color: var(--text);
      margin-bottom: 0.5rem;
      word-wrap: break-word;
    }
    .post-content code {
      font-family: var(--mono);
      font-size: 0.8em;
      background: var(--surface-2);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: var(--accent-d3);
    }
    .post-code {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      overflow-x: auto;
      font-family: var(--mono);
      font-size: 0.75rem;
      line-height: 1.7;
      color: var(--text-dim);
    }
    .post-code code {
      font-family: inherit;
    }

    /* ─── POST ACTIONS ─── */
    .post-actions {
      display: flex;
      gap: 0.25rem;
      margin-top: 0.5rem;
      margin-left: -0.5rem;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.4rem 0.65rem;
      border: none;
      background: none;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 0.7rem;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .action-btn:hover { background: var(--surface-2); }
    .action-btn svg { transition: transform 0.2s; }

    .comment-btn:hover { color: var(--accent-sql); }
    .comment-btn:hover svg { transform: scale(1.15); }

    .repost-btn:hover { color: var(--accent-django); }
    .repost-btn:hover svg { transform: scale(1.15); }

    .like-btn:hover { color: #f43f5e; }
    .like-btn:hover svg { transform: scale(1.2); }
    .like-btn.liked { color: #f43f5e; }
    .like-btn.liked svg { animation: like-pop 0.3s var(--ease-out-expo); }

    .bookmark-btn:hover { color: var(--accent-d3); }
    .bookmark-btn.bookmarked { color: var(--accent-d3); }

    @keyframes like-pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* ─── COMMENTS ─── */
    .post-comments {
      margin-top: 0.5rem;
    }
    .post-comments.empty {
      margin-top: 0;
    }
    .comment {
      display: flex;
      gap: 0.6rem;
      padding: 0.65rem 0;
      position: relative;
    }
    .comment-line {
      position: absolute;
      left: 15px;
      top: 0;
      width: 2px;
      height: 100%;
    }
    .comment:first-child .comment-line {
      top: 50%;
      height: 50%;
    }
    .comment:last-child .comment-line {
      height: 50%;
    }
    .comment:only-child .comment-line {
      display: none;
    }
    .comment-avatar {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      z-index: 1;
    }
    .comment-avatar-user {
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.5rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .comment-body {
      flex: 1;
      min-width: 0;
    }
    .comment-header {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 0.15rem;
    }
    .comment-name {
      font-weight: 600;
      font-size: 0.8rem;
    }
    .comment-handle {
      font-size: 0.72rem;
      color: var(--text-muted);
    }
    .comment-text {
      font-size: 0.85rem;
      line-height: 1.55;
      color: var(--text-dim);
    }
    .comment-text code {
      font-family: var(--mono);
      font-size: 0.78em;
      background: var(--surface-2);
      padding: 0.1em 0.35em;
      border-radius: 3px;
      color: var(--accent-d3);
    }
    .comment-likes {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
      display: inline-block;
    }
    .comment-user .comment-text { color: var(--text); }
    .comment-ai .comment-name { color: var(--accent-d3); }

    /* ─── TYPING INDICATOR ─── */
    .comment-typing .typing-dots {
      display: inline-flex;
      gap: 0.15rem;
      margin-left: 0.5rem;
    }
    .typing-dots span {
      animation: typing-bounce 1.2s infinite;
      font-size: 1.2rem;
      line-height: 1;
      color: var(--text-muted);
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typing-bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* ─── COMMENT COMPOSER ─── */
    .comment-composer {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 0 0.25rem;
      margin-top: 0.25rem;
      border-top: 1px solid var(--border);
    }
    .composer-avatar {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.5rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }
    .composer-input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.85rem;
      outline: none;
      padding: 0.4rem 0;
    }
    .composer-input::placeholder { color: var(--text-muted); }
    .composer-input:disabled { opacity: 0.4; }
    .composer-send {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--surface-2);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .composer-send:hover:not(:disabled) { background: var(--accent-d3); color: #000; }
    .composer-send:disabled { opacity: 0.3; cursor: default; }

    /* ─── POST LINK ─── */
    .post-link {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--text-muted);
      text-decoration: none;
      padding: 0.3rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 0.5rem;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .post-link:hover {
      color: var(--text);
      border-color: var(--border-hover);
      background: var(--surface-2);
    }

    /* ─── POLL ─── */
    .poll-container {
      margin-bottom: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .poll-option {
      position: relative;
      height: 36px;
      border-radius: 6px;
      overflow: hidden;
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .poll-option.poll-top { border-color: var(--border-hover); }
    .poll-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      border-radius: 6px;
      transition: width 0.8s var(--ease-out-expo);
    }
    .poll-text {
      position: relative;
      z-index: 1;
      font-size: 0.8rem;
      padding-left: 0.75rem;
      flex: 1;
    }
    .poll-top .poll-text { font-weight: 600; }
    .poll-pct {
      position: relative;
      z-index: 1;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 600;
      padding-right: 0.75rem;
      min-width: 3rem;
      text-align: right;
    }
    .poll-meta {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ─── LIKE PARTICLES ─── */
    .like-particle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      animation: particle-burst 0.6s var(--ease-out-expo) forwards;
    }
    @keyframes particle-burst {
      0% { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* ─── KEYBOARD FOCUS ─── */
    .post-focused {
      background: var(--surface);
      box-shadow: inset 3px 0 0 var(--text-dim);
    }
    .post-focused .post-track-line { opacity: 0.8; }

    /* ─── SHORTCUT HINT ─── */
    #shortcut-hint {
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      animation: reveal 0.2s var(--ease-out-expo) both;
    }
    .hint-inner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem 2rem;
      min-width: 260px;
    }
    .hint-title {
      font-family: var(--serif);
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }
    .hint-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.35rem 0;
      font-size: 0.82rem;
      color: var(--text-dim);
    }
    .hint-row kbd {
      font-family: var(--mono);
      font-size: 0.7rem;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      color: var(--text);
      min-width: 28px;
      text-align: center;
    }

    /* ─── LOADING STATE ─── */
    .feed-loading {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      padding: 4rem 2rem;
    }
    .loading-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: typing-bounce 1.2s infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.15s; }
    .loading-dot:nth-child(3) { animation-delay: 0.3s; }

    /* ─── USER AVATAR (image) ─── */
    .composer-avatar-user {
      overflow: hidden;
    }
    .composer-avatar-user img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .comment-avatar-user {
      overflow: hidden;
    }
    .comment-avatar-user img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* ─── FEED EMPTY ─── */
    .feed-empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ─── FOOTER ─── */
    .feed-footer {
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      text-align: center;
    }
    .feed-footer p {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 700px) {
      .feed-hero h1 { font-size: 2.2rem; }
      .post-inner { padding: 1rem; }
      .post-avatar { width: 36px; height: 36px; min-width: 36px; font-size: 1rem; }
      .header-nav { display: none; }
      .feed-filters { padding: 1rem; gap: 0.35rem; }
      .filter-tab { font-size: 0.62rem; padding: 0.35rem 0.75rem; }
    }

    .feed-hero h1 { animation: reveal 0.7s var(--ease-out-expo) both; }
    .feed-hero .subtitle { animation: reveal 0.7s var(--ease-out-expo) 0.1s both; }
    .feed-filters { animation: reveal 0.7s var(--ease-out-expo) 0.15s both; }
  </style>
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="dot"></span>
        Learn Coding
      </a>
      <div class="header-right">
        <nav class="header-nav">
          <a href="/">&larr; Home</a>
        </nav>
        <button class="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ─── FEED HERO ─── -->
  <div class="feed-hero">
    <h1 id="feed-title">The Scroll</h1>
    <p class="subtitle" id="feed-subtitle">your algorithm, but useful</p>
  </div>

  <!-- ─── FILTER TOGGLES ─── -->
  <div class="feed-filters">
    <button class="filter-tab active" data-track="d3">D3</button>
    <button class="filter-tab active" data-track="django">Python</button>
    <button class="filter-tab active" data-track="sql">SQL</button>
    <button class="filter-tab active" data-track="jsts">JS/TS</button>
    <button class="filter-tab active" data-track="react">React</button>
    <button class="filter-tab active" data-track="css">CSS</button>
    <button class="filter-tab active" data-track="ai">AI</button>
    <button class="refresh-btn" id="refresh-btn" aria-label="Shuffle feed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      Shuffle
    </button>
  </div>

  <!-- ─── FEED ─── -->
  <div class="feed-column">
    <div id="feed-posts"></div>
  </div>

  <!-- ─── FOOTER ─── -->
  <div class="feed-footer">
    <p>the scroll &mdash; replacing doomscrolling with learning since 2026</p>
    <p style="margin-top:0.5rem;opacity:0.5;">press <kbd style="font-family:var(--mono);background:var(--surface);border:1px solid var(--border);padding:0.1rem 0.35rem;border-radius:3px;font-size:0.6rem;">?</kbd> for keyboard shortcuts</p>
  </div>

  <script>
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    else if (window.matchMedia('(prefers-color-scheme: light)').matches) document.documentElement.setAttribute('data-theme', 'light');
    toggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
  <script type="module" src="./feed.js"></script>
</body>
</html>
