<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Debugger - Learn D3</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon-dKoJCkGQ.svg">
  <style>
    .header {
      padding: 1rem 2rem;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.3rem; font-weight: 600; }
    .header h1 span { color: #818cf8; }
    .header .links { display: flex; gap: 1rem; }
    .header .links a {
      color: #888; text-decoration: none; font-size: 0.85rem;
      transition: color 0.2s;
    }
    .header .links a:hover { color: #f97316; }
    .toolbar {
      padding: 0.75rem 2rem;
      border-bottom: 1px solid #222;
      display: flex;
      gap: 1rem;
      align-items: center;
      background: #111;
    }
    .toolbar label { color: #888; font-size: 0.85rem; }
    .toolbar select {
      background: #1a1a1a; color: #e5e5e5; border: 1px solid #333;
      border-radius: 4px; padding: 0.4rem 0.75rem; font-size: 0.85rem;
    }
    .toolbar button {
      background: #1a1a1a; color: #ccc; border: 1px solid #333;
      border-radius: 4px; padding: 0.5rem 1.2rem; font-size: 0.85rem;
      cursor: pointer; transition: all 0.2s;
    }
    .toolbar button:hover { background: #818cf8; color: #000; border-color: #818cf8; }
    .toolbar button.step-btn {
      background: #818cf8; color: #000; border-color: #818cf8; font-weight: 600;
    }
    .toolbar button.step-btn:hover { background: #a5b4fc; }
    .toolbar .step-info {
      color: #888; font-size: 0.8rem; margin-left: auto;
    }
    .content {
      display: flex;
      height: calc(100vh - 110px);
    }
    .code-panel {
      width: 45%;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .code-panel .panel-label {
      padding: 0.5rem 1rem;
      font-size: 0.75rem; color: #666;
      text-transform: uppercase; letter-spacing: 0.05em;
      background: #111; border-bottom: 1px solid #222;
    }
    .code-lines {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.7;
    }
    .code-line {
      padding: 0 1rem 0 0;
      display: flex;
      border-left: 3px solid transparent;
      transition: all 0.3s;
    }
    .code-line .line-num {
      display: inline-block;
      width: 40px;
      text-align: right;
      padding-right: 12px;
      color: #444;
      user-select: none;
      flex-shrink: 0;
    }
    .code-line .line-text {
      white-space: pre;
      flex: 1;
    }
    .code-line.active {
      background: #818cf822;
      border-left-color: #818cf8;
    }
    .code-line.done {
      background: #4ade8010;
      border-left-color: #4ade8066;
    }
    .right-panel {
      width: 55%;
      display: flex;
      flex-direction: column;
    }
    .svg-panel {
      flex: 1;
      overflow: auto;
      padding: 1.5rem;
      background: #0e0e0e;
    }
    .svg-panel svg {
      background: #1a1a1a;
      border-radius: 6px;
    }
    .annotation-panel {
      height: 220px;
      border-top: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .annotation-panel .panel-label {
      padding: 0.5rem 1rem;
      font-size: 0.75rem; color: #666;
      text-transform: uppercase; letter-spacing: 0.05em;
      background: #111; border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    .annotations {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem;
    }
    .annotation {
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.5;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    .annotation.info { background: #818cf815; border-left: 3px solid #818cf8; }
    .annotation.enter { background: #4ade8015; border-left: 3px solid #4ade80; }
    .annotation.update { background: #60a5fa15; border-left: 3px solid #60a5fa; }
    .annotation.exit { background: #f472b615; border-left: 3px solid #f472b6; }
    .annotation code {
      background: #ffffff10;
      padding: 0.1em 0.3em;
      border-radius: 3px;
      font-size: 0.8rem;
    }
    .data-panel {
      padding: 0.75rem 1rem;
      border-top: 1px solid #222;
      background: #0e0e0e;
      flex-shrink: 0;
    }
    .data-panel h4 {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .data-items {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .data-item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .data-item.entering { border-color: #4ade80; color: #4ade80; }
    .data-item.updating { border-color: #60a5fa; color: #60a5fa; }
    .data-item.exiting { border-color: #f472b6; color: #f472b6; }

    /* Color legend */
    .legend {
      display: flex;
      gap: 1.5rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #222;
      background: #0e0e0e;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: #888;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .legend-dot.enter { background: #4ade80; }
    .legend-dot.update { background: #60a5fa; }
    .legend-dot.exit { background: #f472b6; }
  </style>
  <script type="module" crossorigin src="/assets/d3_code_sandbox_debugger-CsvOBngB.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/init-tutor-Cq4VzOVI.js">
  <link rel="modulepreload" crossorigin href="/assets/transform-DGvXF_4U.js">
  <link rel="modulepreload" crossorigin href="/assets/defaultLocale-_QQJJ3OD.js">
  <link rel="modulepreload" crossorigin href="/assets/linear-Bvwc2yJx.js">
  <link rel="modulepreload" crossorigin href="/assets/band-HgbXjY_x.js">
  <link rel="modulepreload" crossorigin href="/assets/select-PKtlUnGw.js">
  <link rel="modulepreload" crossorigin href="/assets/axis-rlX7cRMw.js">
  <link rel="stylesheet" crossorigin href="/assets/base-77M9ailx.css">
</head>
<body>
  <div class="header">
    <h1>Visual <span>Debugger</span></h1>
    <div class="links">
      <a href="/d3/">Home</a>
      <a href="/d3/code/sandbox/">Sandbox</a>
      <a href="/d3/references/snippets/">Snippets</a>
    </div>
  </div>

  <div class="toolbar">
    <label>Example:</label>
    <select id="example-select">
      <option value="bar-chart">Bar Chart</option>
      <option value="enter-exit">Data Update (Enter/Exit)</option>
      <option value="scales-axes">Scales + Axes</option>
    </select>
    <button id="step-btn" class="step-btn">Step</button>
    <button id="reset-btn">Reset</button>
    <button id="play-btn">Auto-Play</button>
    <span class="step-info" id="step-info">Step 0 / 0</span>
  </div>

  <div class="content">
    <div class="code-panel">
      <div class="panel-label">D3 Code</div>
      <div class="code-lines" id="code-lines"></div>
    </div>
    <div class="right-panel">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot enter"></div> Enter (new)</div>
        <div class="legend-item"><div class="legend-dot update"></div> Update (existing)</div>
        <div class="legend-item"><div class="legend-dot exit"></div> Exit (removed)</div>
      </div>
      <div class="svg-panel" id="svg-panel"></div>
      <div class="data-panel" id="data-panel">
        <h4>Element __data__</h4>
        <div class="data-items" id="data-items"></div>
      </div>
      <div class="annotation-panel">
        <div class="panel-label">What happened</div>
        <div class="annotations" id="annotations"></div>
      </div>
    </div>
  </div>


</body>
</html>
