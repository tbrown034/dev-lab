  <script>
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const TRANSCRIPT = [
      { time: 0, text: "Welcome back to The Pod. I'm Alex, and today we're exploring component patterns in React. This is the episode that turns you from someone who writes React into someone who architects React applications." },
      { time: 16, text: "I'm Sam, and honestly, understanding these patterns was the biggest level-up in my React journey. It's the difference between writing spaghetti components and building a clean, maintainable codebase." },
      { time: 30, text: "Let's start with the most fundamental pattern: composition. In React, composition means building complex UIs by combining simpler components. It's React's answer to inheritance, and the React team explicitly recommends composition over inheritance." },
      { time: 48, text: "The simplest form of composition is the children prop. When you nest JSX inside a component, that content becomes props.children. A Card component doesn't need to know what goes inside it. It just wraps whatever children you pass." },
      { time: 64, text: "Think of it like a picture frame. The frame doesn't care if it holds a photo, a painting, or a poster. It just provides the frame. Your Card component provides the styling and structure, and children provides the content." },
      { time: 80, text: "You can also pass components as regular props, not just children. A Layout component might accept a sidebar prop and a main prop, each receiving a component. This gives you named 'slots' for different content areas." },
      { time: 98, text: "That slot pattern is something you see in design systems all the time. A Dialog component might have a title slot, a body slot, and a footer slot. Each is just a prop that accepts JSX." },
      { time: 112, text: "Now let's talk about the container and presentational pattern. The idea is to separate your logic from your presentation. Container components handle data fetching, state, and business logic. Presentational components just render UI based on props." },
      { time: 130, text: "Is that pattern still relevant with hooks? I've heard people say it's outdated." },
      { time: 136, text: "The strict separation has softened since hooks arrived, because custom hooks can extract logic without needing a container component. But the mental model is still valuable. Keeping your rendering components focused on UI makes them easier to test and reuse." },
      { time: 154, text: "Let's talk about controlled versus uncontrolled components. A controlled component has its state managed by the parent through props. An uncontrolled component manages its own state internally." },
      { time: 170, text: "Form inputs are the classic example. A controlled input gets its value from state and updates via onChange. An uncontrolled input uses a ref to read the value when you need it. Controlled gives you more control, uncontrolled is simpler for basic cases." },
      { time: 188, text: "But this pattern extends beyond forms. Any component can be controlled or uncontrolled. An accordion might manage its own open/closed state internally, or it could accept an isOpen prop from the parent. Making it controlled lets the parent coordinate multiple accordions." },
      { time: 208, text: "Now let's cover render props. A render prop is a function that a component calls to determine what to render. Instead of hardcoding the output, the component delegates rendering to the consumer." },
      { time: 224, text: "So a MouseTracker component might track the mouse position internally but call a render prop with the x and y values. The consumer decides how to use those coordinates. Maybe one consumer renders a tooltip, another renders a cursor trail." },
      { time: 242, text: "Render props were huge before hooks. Now, most render prop use cases are better served by custom hooks. But you still see them in libraries, and they're useful when you need to share behavior between components that render different things." },
      { time: 260, text: "Higher-order components, or HOCs, are another pattern worth knowing. An HOC is a function that takes a component and returns a new component with additional props or behavior. Like withAuth(MyComponent) might return a component that checks authentication first." },
      { time: 280, text: "HOCs are less common now, again because of hooks. But you'll encounter them in older codebases and some libraries still use them. React.memo() is technically an HOC, for example." },
      { time: 296, text: "Let's talk about compound components. This is one of my favorites. It's when a set of components work together to form a cohesive unit, like Select with Option, or Tabs with TabList and TabPanel." },
      { time: 312, text: "The key to compound components is shared implicit state. The parent component manages the state and shares it with its children through React context. The children don't work independently; they're designed to be used together." },
      { time: 330, text: "HTML already does this. A select element has options. A table has thead, tbody, tr, td. Compound components bring that same pattern to custom React components." },
      { time: 344, text: "One more pattern: the reducer pattern with useReducer. When your state logic gets complex, with multiple related values and complex transitions, useReducer is cleaner than multiple useState calls." },
      { time: 362, text: "It's basically the same idea as Redux but built into React. You define a reducer function that takes state and an action, and returns new state. All your state transitions are in one place, which makes them easier to test and reason about." },
      { time: 380, text: "To summarize the patterns: composition with children for flexible nesting, container/presentational for separating logic from UI, controlled/uncontrolled for state ownership, render props and HOCs for sharing behavior, compound components for cohesive groups, and useReducer for complex state." },
      { time: 402, text: "The most important thing is knowing when to reach for each pattern. Start simple with composition and useState. Only add complexity when you feel the pain of not having it. That's the React way." },
      { time: 418, text: "Great advice. That wraps up the React track for now. Thanks for listening, and happy building, everyone!" }
