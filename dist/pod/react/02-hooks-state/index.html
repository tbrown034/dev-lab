  <script>
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const TRANSCRIPT = [
      { time: 0, text: "Welcome back to The Pod. I'm Alex, and today we're diving into the feature that completely changed how people write React: hooks. Specifically useState and useEffect." },
      { time: 14, text: "I'm Sam, and I remember when hooks dropped in React 16.8. It was like the entire community collectively said 'finally!' because class components had been driving everyone a little crazy." },
      { time: 28, text: "Let's start with why hooks exist. Before hooks, if you wanted state or lifecycle methods, you had to use a class component. Function components were 'dumb' or 'stateless.' Hooks let function components do everything classes could do, but with less boilerplate." },
      { time: 46, text: "So much less boilerplate. No more constructor, no more binding this in event handlers, no more converting a function component to a class just because you need one piece of state. Hooks made React simpler and more consistent." },
      { time: 62, text: "Let's start with useState. It's the most basic hook. You call it with an initial value, and it returns an array with two elements: the current state value and a function to update it." },
      { time: 76, text: "The classic example: const [count, setCount] = useState(0). That gives you a count variable starting at 0 and a setCount function. When you call setCount(1), React re-renders your component with the new value." },
      { time: 94, text: "And you can have as many useState calls as you want. Need a name and an age? Two separate useState calls. Each one is independent. That's actually a big advantage over class state where everything was in one big this.state object." },
      { time: 112, text: "There's a subtlety with the setter function though. If your new state depends on the previous state, you should use the functional form: setCount(prev => prev + 1) instead of setCount(count + 1). Why is that?" },
      { time: 130, text: "Batching. React batches state updates for performance. If you call setCount(count + 1) three times in a row, count is the same stale value each time, so you end up adding 1, not 3. The functional form guarantees you're working with the latest value." },
      { time: 150, text: "That's one of those gotchas that bites everyone at least once. Now let's talk about useEffect. If useState is for 'remembering things,' useEffect is for 'doing things as a side effect of rendering.'" },
      { time: 166, text: "Side effects are anything that reaches outside your component. Fetching data from an API. Setting up a subscription. Manually changing the DOM. Setting a timer. These are all effects." },
      { time: 182, text: "The basic syntax is useEffect(() => { /* your effect */ }). The function you pass runs after every render. But that's usually too often. That's where the dependency array comes in." },
      { time: 198, text: "Right, the second argument. useEffect(() => { ... }, [dependency1, dependency2]). The effect only re-runs when one of those dependencies changes. If you pass an empty array, it runs once on mount and never again." },
      { time: 216, text: "The empty dependency array pattern is super common for data fetching. You want to fetch data when the component mounts, not on every re-render. So useEffect(() => { fetchData() }, [])." },
      { time: 232, text: "There's also the cleanup function. If your effect returns a function, React runs that function before the next effect and when the component unmounts. It's essential for subscriptions and timers." },
      { time: 248, text: "Like if you set up a WebSocket connection in an effect, you return a cleanup function that closes the connection. Without that, you'd leak connections every time the component re-renders or unmounts." },
      { time: 264, text: "Now here's the big one: the rules of hooks. There are only two, but they're non-negotiable. First: only call hooks at the top level. Never inside loops, conditions, or nested functions." },
      { time: 280, text: "Why is that rule so strict?" },
      { time: 284, text: "Because React tracks hooks by their call order. On every render, React expects the same hooks to be called in the same order. If you put a useState inside an if statement, sometimes it runs, sometimes it doesn't, and React's internal bookkeeping breaks." },
      { time: 304, text: "Think of it like a list. React has a list of hook values: slot 1 is count, slot 2 is name, slot 3 is the effect. If you skip slot 2 conditionally, suddenly slot 3's value gets assigned to slot 2's variable. Everything shifts and breaks." },
      { time: 324, text: "The second rule: only call hooks from React function components or custom hooks. Don't call useState from a regular JavaScript function. React wouldn't know which component it belongs to." },
      { time: 340, text: "And that leads us naturally to custom hooks. A custom hook is just a function whose name starts with 'use' that calls other hooks. It lets you extract and reuse stateful logic between components." },
      { time: 356, text: "Like a useWindowSize hook that tracks the browser window dimensions. Inside, it uses useState for the size and useEffect with a resize listener. Any component that needs the window size just calls useWindowSize()." },
      { time: 374, text: "Custom hooks are one of the most powerful composition patterns in React. They replaced the complex patterns people used before, like higher-order components and render props, for most use cases." },
      { time: 390, text: "Let me mention a few other built-in hooks briefly. useRef gives you a mutable reference that persists across renders without causing re-renders. useMemo and useCallback memoize values and functions for performance. useContext accesses context without a consumer wrapper." },
      { time: 412, text: "useRef is one people overlook. It's not just for DOM refs. It's for any value you want to persist across renders without triggering a re-render. Like storing a previous value, a timer ID, or a WebSocket instance." },
      { time: 430, text: "To summarize: useState for state, useEffect for side effects, always call hooks at the top level in the same order, and extract reusable logic into custom hooks. These four ideas cover 90% of what you need." },
      { time: 448, text: "Next episode, we'll build on this with component patterns: composition, render props, and how to structure reusable UI pieces. See you there!" }
    ];
