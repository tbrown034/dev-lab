  <script>
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const TRANSCRIPT = [
      { time: 0, text: "Welcome to The Pod. I'm Alex, and we're kicking off the Django track. But before we touch Django, we need to learn Python. Today we're covering the fundamentals, and we're going to use JavaScript as our translation guide." },
      { time: 16, text: "I'm Sam, and I think this approach makes so much sense. If you already know JavaScript, Python is going to feel familiar in many ways but with some important differences that can trip you up." },
      { time: 28, text: "Let's start with variables. In JavaScript, you use let, const, or var. In Python, you just assign. No keyword needed. name = 'Alex' and you're done. No semicolons either." },
      { time: 42, text: "That simplicity is one of the things people love about Python. But it means there's no built-in way to declare a constant. By convention, you use ALL_CAPS for constants, like MAX_SIZE = 100, but Python won't stop you from reassigning it." },
      { time: 58, text: "Types in Python are dynamic, just like JavaScript. You don't declare types. But Python is strongly typed, which is different from JavaScript. In JS, '5' + 3 gives you '53' through type coercion. In Python, that's a TypeError. Python doesn't silently convert types." },
      { time: 78, text: "That caught me off guard at first. In JavaScript, you get used to all that implicit conversion. Python makes you be explicit. If you want to concatenate a string and a number, you need str(3) to convert it first." },
      { time: 94, text: "The basic types are similar though. Strings, integers, floats, booleans. Python has int and float as separate types, while JavaScript just has Number. Python also has None where JavaScript has null and undefined." },
      { time: 110, text: "Just None. No undefined. That's actually simpler. And Python's booleans are True and False with capital letters, not lowercase like JavaScript." },
      { time: 122, text: "Now, control flow. If statements in Python don't use parentheses or curly braces. Instead, they use a colon and indentation. 'if x > 5:' followed by an indented block. The indentation is the structure." },
      { time: 140, text: "This is the biggest adjustment for JavaScript developers. In JS, indentation is optional, just for readability. In Python, it's part of the syntax. Wrong indentation means a syntax error." },
      { time: 156, text: "Python uses elif instead of else if. And the logical operators are the actual English words: and, or, not. Instead of &&, ||, and !. It reads almost like plain English." },
      { time: 170, text: "For loops are a bit different too. Python's for loop is what JavaScript calls a for...of loop. 'for item in list:' iterates directly over the values. If you need the index too, you use enumerate: 'for i, item in enumerate(list):'." },
      { time: 190, text: "There's no traditional C-style for loop with initialization, condition, and increment. If you want to loop a certain number of times, you use range: 'for i in range(10):' gives you 0 through 9." },
      { time: 206, text: "While loops work the same as JavaScript. 'while condition:' with an indented body. Python also has break and continue, same as JS." },
      { time: 218, text: "String formatting is where Python really shines. f-strings are like JavaScript template literals but even cleaner. f'Hello, {name}!' with the f prefix. You can put any expression inside the curly braces." },
      { time: 236, text: "I'd argue f-strings are better than template literals because you can do formatting right in the braces. f'{price:.2f}' formats a number to two decimal places. f'{name:>20}' right-aligns in a 20-character field. Very handy." },
      { time: 254, text: "Let's talk about truthiness. In JavaScript, empty string, 0, null, undefined, NaN, and false are falsy. Python is similar: empty string, 0, None, False, empty list, empty dict, and empty set are all falsy." },
      { time: 274, text: "One nice thing in Python: you can check if a list is empty just by using 'if my_list:'. If it has items, it's truthy. If it's empty, it's falsy. Very clean compared to checking .length in JavaScript." },
      { time: 290, text: "Comments in Python use the hash symbol instead of double slashes. And for multi-line comments, you can use triple quotes, either single or double. Those triple-quoted strings also work as docstrings for documenting functions." },
      { time: 306, text: "Error handling is try/except in Python instead of try/catch. The syntax is almost identical otherwise. 'try:' block, 'except ValueError as e:' to catch specific exceptions." },
      { time: 320, text: "To wrap up: Python has cleaner syntax than JavaScript in many ways. No semicolons, no curly braces, no var/let/const. But it's strict about indentation and strong about types. If you know JavaScript, you already understand most of the concepts. The translation is straightforward." },
      { time: 342, text: "Next episode, we're diving into Python collections: lists, dicts, sets, and tuples. They map closely to JavaScript arrays and objects, but with some powerful extras. See you there!" }
    ];
  </script>
