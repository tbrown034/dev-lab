  <script>
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const TRANSCRIPT = [
      { time: 0, text: "Welcome back to The Pod. I'm Alex, and today we're going deep on Python functions. We covered the basics last time, but Python functions have some incredibly powerful features that go way beyond what JavaScript offers natively." },
      { time: 16, text: "I'm Sam, and this is the episode where Python starts showing off. Decorators, generators, and advanced argument handling. These are the features that make experienced Python developers so productive." },
      { time: 30, text: "Let's start with function basics and how they differ from JavaScript. You define a function with def instead of function. def greet(name): return f'Hello, {name}'. Python also has lambda for small anonymous functions: lambda x: x * 2." },
      { time: 48, text: "Lambda is like JavaScript arrow functions but more limited. A lambda can only contain a single expression. No statements, no multi-line logic. For anything complex, you define a named function. Python intentionally keeps lambdas simple." },
      { time: 64, text: "Now, argument handling in Python is much more flexible than JavaScript. You have positional arguments, keyword arguments, default values, *args for variable positional arguments, and **kwargs for variable keyword arguments." },
      { time: 82, text: "Wait, can you explain *args and **kwargs? That syntax is confusing at first." },
      { time: 88, text: "Sure. *args collects extra positional arguments into a tuple. If your function is def add(*args), you can call it with any number of arguments: add(1, 2, 3). Inside the function, args is the tuple (1, 2, 3)." },
      { time: 106, text: "And **kwargs collects extra keyword arguments into a dictionary. def config(**kwargs) lets you call config(host='localhost', port=8080), and kwargs becomes {'host': 'localhost', 'port': 8080}. It's like JavaScript's rest parameters and object destructuring combined." },
      { time: 128, text: "You can also force arguments to be keyword-only by putting them after a bare * in the parameter list. def process(data, *, verbose=False) means verbose can only be passed as a keyword argument. This prevents subtle bugs." },
      { time: 148, text: "Now let's talk about decorators. This is one of Python's most distinctive features. A decorator is a function that wraps another function to modify its behavior. You apply it with the @ syntax above a function definition." },
      { time: 166, text: "The classic example is a timer decorator. @timer above a function definition, and now that function automatically prints how long it took to run. You didn't change the function's code at all. The decorator adds behavior externally." },
      { time: 184, text: "Under the hood, @timer above def my_func() is just syntactic sugar for my_func = timer(my_func). The decorator receives the function, wraps it in a new function that adds the timing logic, and returns the wrapper." },
      { time: 204, text: "This is huge in Django. @login_required checks if a user is authenticated before running a view. @csrf_exempt skips CSRF checking. @cache_page caches the response. Decorators are everywhere in Python web frameworks." },
      { time: 224, text: "You can also write decorators with arguments, which is a decorator factory. @cache(timeout=300) first calls cache(timeout=300) which returns the actual decorator, which then wraps your function. It's decorators all the way down." },
      { time: 242, text: "Let's move to generators. A generator is a function that produces a sequence of values lazily, one at a time, instead of computing everything upfront and returning a list." },
      { time: 256, text: "You create a generator by using yield instead of return. When you call a generator function, it doesn't run immediately. It returns a generator object. Each time you call next() on it or iterate over it, it runs until the next yield, produces that value, and pauses." },
      { time: 276, text: "Why is that useful? Why not just return a list?" },
      { time: 282, text: "Memory efficiency. Imagine processing a file with a billion lines. If you read all lines into a list, you need memory for a billion strings. A generator processes one line at a time. It's the difference between loading a whole movie into RAM versus streaming it." },
      { time: 302, text: "Python has generator expressions too, which are like list comprehensions but with parentheses instead of brackets. (x * 2 for x in range(1000000)) creates a generator, not a list. Almost zero memory regardless of size." },
      { time: 320, text: "range() itself is actually a lazy iterator in Python 3. range(1000000) doesn't create a million numbers in memory. It generates each number on demand. This is why Python 3 changed range from returning a list to returning an iterator." },
      { time: 338, text: "Let's also cover closures, since they work slightly differently from JavaScript. A closure in Python captures variables from the enclosing scope, but there's a gotcha: if you want to modify a variable from the enclosing scope, you need the nonlocal keyword." },
      { time: 358, text: "In JavaScript, you can freely modify variables from outer scopes in closures. In Python, assignment inside a function creates a local variable by default. nonlocal tells Python you mean the variable from the outer scope. It's more explicit." },
      { time: 376, text: "Last topic: first-class functions. Functions in Python are objects. You can pass them as arguments, return them from other functions, store them in lists and dicts. map(str, [1, 2, 3]) passes the str function to map. Very functional programming style." },
      { time: 396, text: "The built-in functions like map, filter, sorted with a key function, and functools.reduce give Python solid functional programming chops without needing a separate paradigm. It's practical functional programming." },
      { time: 414, text: "To wrap up: Python functions support flexible arguments with *args and **kwargs, decorators for modifying behavior, generators for lazy evaluation, closures with nonlocal, and first-class function passing. These are the tools that make Python code concise and powerful." },
      { time: 436, text: "That wraps up the Python fundamentals for the Django track. With these three episodes under your belt, you have the Python foundation you need to start building with Django. Thanks for listening!" }
    ];
  </script>
