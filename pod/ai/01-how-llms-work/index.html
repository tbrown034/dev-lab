  <script>
    // ─── Theme Toggle ───
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // ─── Transcript Data ───
    const TRANSCRIPT = [
      { time: 0, text: "Hey, welcome to The Pod. I'm Alex, and today we're starting the AI track with the question everyone's asking: how do large language models actually work? Sam, you've been building with LLMs for a while now. Where do we start?" },
      { time: 14, text: "Let's start with what an LLM actually is at its core. Strip away all the hype, and a large language model is a next-token predictor. That's it. Given a sequence of text, it predicts what comes next." },
      { time: 28, text: "Wait, that sounds almost too simple. How does predicting the next word produce something that feels intelligent?" },
      { time: 35, text: "That's the magic. It turns out that to be really, really good at predicting the next word, you have to develop a deep understanding of language, logic, facts, even reasoning patterns. The intelligence is an emergent property of the prediction task." },
      { time: 52, text: "Okay, but before we go further, let's talk about tokens. Because LLMs don't actually work with words. They work with tokens." },
      { time: 61, text: "Right. A token is a chunk of text, usually a word or part of a word. The word 'understanding' might be two tokens: 'understand' and 'ing'. Common words like 'the' or 'is' are single tokens. Rare words get split into smaller pieces." },
      { time: 78, text: "So the model has a vocabulary of, say, 50,000 to 100,000 tokens. Every piece of text gets broken down into a sequence of these tokens. And the model's job is to predict which token comes next in the sequence." },
      { time: 93, text: "And it doesn't just predict one token. It assigns a probability to every token in its vocabulary. It might say there's a 40% chance the next token is 'the,' a 15% chance it's 'a,' a 3% chance it's 'quantum,' and so on." },
      { time: 110, text: "That probability distribution is everything. The model generates text by sampling from that distribution, picking a token, appending it to the sequence, and then predicting again. Over and over. That's called autoregressive generation." },
      { time: 126, text: "Now, how does the model learn these probabilities? That's where training comes in. LLMs are trained on enormous amounts of text. We're talking trillions of tokens from books, websites, code, conversations." },
      { time: 141, text: "During training, the model sees a sequence of tokens and tries to predict the next one. If it's wrong, the error gets used to adjust its internal parameters, its weights, slightly. This happens billions of times across the training data." },
      { time: 158, text: "Let's talk about those internal parameters because that's the architecture, and it's called a transformer. The transformer was introduced in a 2017 paper called 'Attention Is All You Need,' and it completely changed AI." },
      { time: 173, text: "The key innovation of the transformer is the attention mechanism. Before transformers, models processed text sequentially, one word at a time, left to right. Attention lets the model look at all parts of the input simultaneously." },
      { time: 190, text: "Think of it like this. When you read the sentence 'The cat sat on the mat because it was tired,' what does 'it' refer to? The cat, not the mat. You know this because you pay attention to the relationship between 'it' and 'cat' and 'tired.'" },
      { time: 208, text: "That's exactly what the attention mechanism does. For each token, it computes how much it should 'attend to' every other token. It builds a web of relationships across the entire sequence." },
      { time: 222, text: "And it does this through three matrices: queries, keys, and values. I know that sounds abstract, but the intuition is: the query asks 'what am I looking for?', the key says 'here's what I contain,' and when they match well, the value gets passed along." },
      { time: 240, text: "Imagine a library. You walk in with a question, that's your query. Each book has a title and a description, those are the keys. When your question matches a book's description, you pull that book and read its content, that's the value." },
      { time: 256, text: "And here's the 'multi-head' part. The model doesn't do this once, it does it multiple times in parallel. Each 'head' can learn to pay attention to different things. One head might track syntax, another tracks meaning, another tracks sentiment." },
      { time: 273, text: "A modern LLM like GPT-4 or Claude has dozens of these attention layers stacked on top of each other. Early layers tend to learn basic patterns like grammar. Middle layers learn more abstract concepts. Later layers handle complex reasoning." },
      { time: 290, text: "Let's talk scale because it matters enormously. GPT-3 had 175 billion parameters. These are the adjustable numbers inside the model that were tuned during training. More parameters generally means more capacity to learn patterns." },
      { time: 307, text: "But it's not just parameter count. The amount and quality of training data matters just as much, maybe more. A smaller model trained on better data can outperform a larger model trained on junk." },
      { time: 320, text: "Now, after the initial pre-training, there's a second phase that makes LLMs actually useful: fine-tuning and alignment. The base pre-trained model is great at predicting text, but it's not great at following instructions." },
      { time: 336, text: "This is where RLHF comes in, reinforcement learning from human feedback. Humans rate different model outputs, and the model gets further trained to produce responses that humans prefer. That's what makes it helpful, harmless, and honest." },
      { time: 352, text: "Let's clear up a common misconception. LLMs don't have a database of facts they look up. All their knowledge is encoded implicitly in those billions of parameters. It's pattern matching at an incredible scale." },
      { time: 367, text: "Which is also why they hallucinate. When the model doesn't have strong patterns for something, it still generates text that sounds plausible. It's optimized for coherent language, not for truth. It fills in the gaps with what sounds right." },
      { time: 384, text: "This is critical for builders to understand. An LLM is confident-sounding by design. You can't trust it as a source of truth. You use it as a reasoning engine and pair it with real data sources. That's what RAG is about, but that's a future episode." },
      { time: 400, text: "One more concept that's crucial: the context window. The model can only attend to a fixed number of tokens at once. Early models had 2K or 4K tokens. Modern ones handle 100K or even a million tokens." },
      { time: 416, text: "The context window is basically the model's working memory. Everything it needs to generate a good response has to fit in that window: your prompt, any examples you give it, any documents you paste in." },
      { time: 430, text: "So to summarize: LLMs are next-token predictors built on the transformer architecture. They use attention mechanisms to understand relationships between tokens. They're trained on massive text datasets and aligned with human preferences." },
      { time: 447, text: "Their knowledge is baked into their parameters, not stored in a database. They hallucinate because they optimize for coherent language, not truth. And their context window is the bottleneck for how much information they can work with at once." },
      { time: 463, text: "Understanding this architecture changes how you build with LLMs. You stop treating them like magic and start treating them like powerful but flawed tools. Next episode, we'll cover prompt engineering, how to talk to these models effectively. See you then." }
    ];
  </script>
