  <script>
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const TRANSCRIPT = [
      { time: 0, text: "Welcome back to The Pod. I'm Alex. Today we're tackling maps, one of D3's most visually impressive capabilities. If you've ever seen an interactive election map or a COVID tracker, chances are D3 was behind it." },
      { time: 16, text: "I'm Sam, and I have to say, building my first map with D3 was the moment I fell in love with the library. There's something magical about turning raw geographic data into a visual you can explore." },
      { time: 30, text: "Let's start with the fundamental challenge: the earth is a sphere, but your screen is flat. You can't perfectly represent a 3D surface on a 2D screen. That's where projections come in." },
      { time: 44, text: "A projection is a mathematical function that converts latitude and longitude coordinates into x and y pixel positions. Every world map you've ever seen uses a projection, and every projection distorts something. Area, shape, distance, or direction." },
      { time: 62, text: "The most common projection you've seen is Mercator. It's what Google Maps uses. It preserves shapes well but massively distorts size. Greenland looks as big as Africa, but Africa is actually 14 times larger." },
      { time: 80, text: "D3 has dozens of projections built in. d3.geoMercator, d3.geoAlbersUsa which is great for US maps because it repositions Alaska and Hawaii, d3.geoOrthographic which gives you a globe view, and many more." },
      { time: 98, text: "For broadcast news graphics, which projection do you see most?" },
      { time: 104, text: "For US maps, geoAlbersUsa is the standard. For world maps, geoNaturalEarth1 or geoEqualEarth are popular because they balance distortion well. The choice depends on what you're showing and what distortions you can tolerate." },
      { time: 122, text: "Now, projections need geographic data to project. That data comes in two main formats: GeoJSON and TopoJSON. Let's break those down." },
      { time: 134, text: "GeoJSON is the simpler format. It's a standard JSON structure that describes geographic features: points, lines, and polygons. Each feature has a geometry with coordinates and a properties object for metadata like names and IDs." },
      { time: 152, text: "A GeoJSON file for US states would have 50-something features, each with a polygon or multipolygon geometry that traces the state's border, plus properties like the state name and FIPS code." },
      { time: 168, text: "TopoJSON is GeoJSON's more efficient cousin. Created by Mike Bostock, D3's creator. Instead of storing each polygon independently, TopoJSON stores the topology: shared borders are only stored once. This typically reduces file size by 80% or more." },
      { time: 188, text: "That's a huge deal for web performance. A GeoJSON file for world countries might be 15 megabytes. The TopoJSON equivalent could be 1 or 2 megabytes. You do need to convert it back to GeoJSON on the client though, using the topojson-client library." },
      { time: 208, text: "Alright, let's put it together. How do you actually draw a map? The workflow is: load your geographic data, set up a projection, create a path generator, and bindthe features to path elements." },
      { time: 224, text: "The path generator is d3.geoPath(). You configure it with your projection, and it becomes a function that takes a GeoJSON feature and returns an SVG path string. It's like d3.line but for geography." },
      { time: 242, text: "So in code, you'd do: const path = d3.geoPath().projection(projection). Then select your SVG, bindyour GeoJSON features array to path elements, and set each path's d attribute using the path generator. That's it. You have a map." },
      { time: 262, text: "But a plain map is just outlines. The real power comes when you add data. That's a choropleth map, where regions are colored based on a data value. Population density, election results, COVID cases, whatever." },
      { time: 278, text: "To build a choropleth, you need to join your geographic data with your statistical data. Usually by a shared identifier like a FIPS code or country ISO code. Then you create a color scale that maps data values to colors." },
      { time: 296, text: "Something like d3.scaleSequential(d3.interpolateBlues).domain([0, maxValue]). Then when you set each path's fill, you use the color scale: .attr('fill', d => colorScale(dataMap.get(d.id)))." },
      { time: 314, text: "What about interactivity? Hovering over states to see tooltips, clicking to zoom in?" },
      { time: 322, text: "D3 makes that straightforward. You add event listeners to your path elements. On mouseover, you can highlight the region, show a tooltip with the data, and on click you can zoom in using d3.zoom or by transitioning the projection." },
      { time: 340, text: "The fitSize method is also incredibly handy. projection.fitSize([width, height], geoJSON) automatically scales and centers your projection to fit the given geographic data within your SVG dimensions. No manual tweaking needed." },
      { time: 358, text: "Let me mention one more thing: d3.geoPath has a centroid method that gives you the center point of any feature. That's great for placing labels or symbols at the center of states or countries." },
      { time: 374, text: "And if you want to draw point data on your map, like city locations, you can use your projection directly. projection([longitude, latitude]) returns the x, y pixel coordinates, and you just place circles there." },
      { time: 390, text: "One gotcha: GeoJSON coordinates are [longitude, latitude], not [latitude, longitude]. Longitude is x, latitude is y. It's backwards from what most people expect, and it's caused countless bugs." },
      { time: 406, text: "That's the voice of experience right there. To wrap up: projections convert coordinates to pixels, GeoJSON and TopoJSON provide the geographic shapes, d3.geoPath draws them as SVG paths, and choropleths add data through color scales." },
      { time: 424, text: "Maps are where D3 really demonstrates its power as a visualization library. No other JavaScript tool gives you this level of control over geographic rendering." },
      { time: 436, text: "Absolutely. That wraps up the D3 track for now. We've gone from SVG basics to maps. If you've followed along, you have the foundation to build any visualization you can imagine. Thanks for listening, everyone!" }
    ];
  </script>
