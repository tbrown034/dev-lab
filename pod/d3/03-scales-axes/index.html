  <script>
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const TRANSCRIPT = [
      { time: 0, text: "Hey everyone, welcome back to The Pod. I'm Alex, and today we're tackling one of D3's most practical tools: scales. If data binding is the heart of D3, scales are the circulatory system." },
      { time: 15, text: "I'm Sam, and I think scales are actually the part of D3 I use the most. Even outside of D3, the concept of mapping one range of values to another is everywhere in programming." },
      { time: 28, text: "Great point. So what is a scale? At its simplest, a scale is a function that takes an input value from your data and returns an output value for your visualization. You give it a number like 50, and it tells you the pixel position 250." },
      { time: 45, text: "It's literally a mathematical mapping. You define the domain, which is the range of your input data, and the range, which is the range of your output values, usually pixel positions. The scale handles the translation." },
      { time: 60, text: "The most common scale is d3.scaleLinear. It does exactly what it sounds like: a linear mapping. If your data goes from 0 to 100, and your chart is 500 pixels wide, a linear scale maps 50 to 250, 25 to 125, and so on." },
      { time: 78, text: "And the API is super clean. You write d3.scaleLinear().domain([0, 100]).range([0, 500]). That gives you a function. Then you call that function with any value and it returns the mapped output." },
      { time: 94, text: "What about categorical data? Like if I have bar chart categories: apples, oranges, bananas. Those aren't numbers." },
      { time: 104, text: "That's where d3.scaleBand comes in. It's designed for ordinal or categorical data. You give it an array of categories as the domain and a pixel range, and it divides that space evenly. It even gives you a .bandwidth() method that tells you how wide each band is." },
      { time: 122, text: "scaleBand is perfect for bar charts. Each category gets an equal chunk of horizontal space, and bandwidth tells you how wide to make each bar. You can also set .padding() to add gaps between bars." },
      { time: 138, text: "There's also d3.scaleTime for date-based data. It works just like scaleLinear but the domain takes Date objects. Perfect for time series charts, which are incredibly common in data viz." },
      { time: 154, text: "And scaleLog, scaleSqrt, scalePow for when your data isn't evenly distributed. If you have values ranging from 1 to a million, a linear scale would squash most of your data into a tiny space. A log scale spreads things out more evenly." },
      { time: 172, text: "Let's talk about color scales too. D3 has scaleOrdinal for mapping categories to specific colors, and scaleSequential for mapping continuous data to a color gradient. You can use built-in color schemes like d3.schemeCategory10 or d3.interpolateBlues." },
      { time: 192, text: "Now, once you have scales, you need axes to make them readable. A chart without axes is just abstract art. Axes show the viewer what the numbers and positions actually mean." },
      { time: 206, text: "D3 has four axis generators: axisTop, axisBottom, axisLeft, and axisRight. They correspond to where the labels appear relative to the axis line. Most charts use axisBottom for x and axisLeft for y." },
      { time: 222, text: "Here's how it works: you create an axis generator and pass it your scale. Like const xAxis = d3.axisBottom(xScale). Then you create a g element, translate it to where you want the axis, and call the axis on it using .call(xAxis)." },
      { time: 242, text: "That .call() pattern is interesting. It's D3's way of applying a function to a selection. The axis generator is actually a function that takes a selection and adds all the necessary SVG elements: the line, the tick marks, the labels." },
      { time: 258, text: "And you get a lot of control over ticks. .ticks(5) suggests approximately five tick marks. .tickFormat() lets you customize how values are displayed. d3.format helps with number formatting, like adding commas or showing percentages." },
      { time: 276, text: "One thing that always bugged me: when you first render an axis, the tick labels might overlap. How do you handle that?" },
      { time: 286, text: "A few approaches. You can rotate the labels with a transform. You can use fewer ticks. Or for a bottom axis with long labels, you can use .tickSizeOuter(0) to clean up the edges and manually rotate text 45 degrees. It's a bit fiddly but it works." },
      { time: 304, text: "Let's not forget about .nice(). When you call .nice() on a scale, it rounds the domain to nice round numbers. Instead of a domain of [3, 97], you get [0, 100]. It makes axes look much cleaner." },
      { time: 320, text: "That's a great tip. The .nice() method is one of those small things that makes your charts look professional instead of auto-generated." },
      { time: 332, text: "Also worth mentioning: .clamp(true). By default, if you pass a value outside the domain, the scale extrapolates. With clamping, it caps the output to the range. Useful for preventing elements from drawing outside your chart area." },
      { time: 350, text: "So to summarize: scales map data to visual properties. Linear for numbers, band for categories, time for dates. Axes visualize those scales for the viewer. Together, they're the foundation of any readable chart." },
      { time: 368, text: "Next episode, we're going to combine everything we've learned so far and build actual shapes with the enter-update-exit pattern. Shapes and data joins. It's where D3 really starts to feel powerful." },
      { time: 382, text: "If you want to experiment, try creating a simple linear scale in the console and call it with different values. It's just a function! See you next time." }
    ];
  </script>
