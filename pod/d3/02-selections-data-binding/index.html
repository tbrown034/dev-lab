  <script>
    // ─── Theme Toggle ───
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    // ─── Transcript Data ───
    const TRANSCRIPT = [
      { time: 0, text: "Welcome back to The Pod. I'm Alex, and today we're diving into what I think is the single most important concept in D3: selections and data binding." },
      { time: 14, text: "I'm Sam, and I'll be honest, this topic confused me for weeks when I was learning D3. But once it clicked, everything else fell into place. So let's make it click for everyone today." },
      { time: 28, text: "Alright, let's start with selections. In vanilla JavaScript, you might use document.querySelector to grab a DOM element. D3 has its own version: d3.select and d3.selectAll." },
      { time: 42, text: "Right, so d3.select grabs the first matching element, and d3.selectAll grabs all of them. But here's the thing, what you get back isn't a raw DOM element. It's a D3 selection object, and that's where the magic lives." },
      { time: 58, text: "Exactly. A D3 selection is basically a wrapper around DOM elements that gives you this beautiful chainable API. You can call .attr() to set attributes, .style() for inline styles, .text() for text content, and they all return the selection so you can keep chaining." },
      { time: 76, text: "So something like d3.select('circle').attr('r', 50).style('fill', 'blue') would find the first circle, set its radius to 50, and make it blue. All in one chain." },
      { time: 90, text: "That's a great example. But here's where D3 gets really interesting and really different from jQuery or vanilla JS. Data binding. This is the core idea: you take an array of data and you bind it to a set of DOM elements." },
      { time: 108, text: "I love the wedding seating chart analogy for this. Imagine you're planning a wedding. You have a list of guests, that's your data. And you have tables with chairs, those are your DOM elements. Data binding is the process of assigning each guest to a seat." },
      { time: 126, text: "That's perfect. And the method that does this is .data(). You call selectAll on the elements you want to bindto, then call .data() with your array, and D3 figures out the matching. One data point per element." },
      { time: 142, text: "But what happens when you have more guests than chairs? Or more chairs than guests? That's where enter and exit come in, right?" },
      { time: 154, text: "Exactly! This is the enter-update-exit pattern, and it's the heart of D3. When you bind data, three things can happen. Some data points match existing elements, that's the update selection. Some data points have no matching element, that's the enter selection. And some elements have no matching data, that's the exit selection." },
      { time: 176, text: "Back to the wedding analogy: update is guests who already have seats. Enter is new guests who need chairs. Exit is empty chairs that need to be removed because those guests cancelled." },
      { time: 192, text: "I love that. So in code, after you call .data(), you call .enter() to get the unmatched data points. Then you typically call .append() to create new elements for them. Like selection.enter().append('circle') creates a new circle for each data point that doesn't have one." },
      { time: 214, text: "And .exit().remove() cleans up elements that no longer have data. This is how D3 handles dynamic data. Your data changes, you rebind it, and D3 tells you what's new, what's updated, and what's gone." },
      { time: 230, text: "There's also the .join() method, which is newer and honestly way cleaner for most cases. Instead of manually handling enter, update, and exit, you just call .join('circle') and D3 handles the whole lifecycle." },
      { time: 248, text: "Wait, so .join() replaces all that enter-append-exit boilerplate?" },
      { time: 254, text: "For the common case, yes. Under the hood, it's doing the same thing. It appends elements for entering data, updates existing ones, and removes exiting ones. You can also pass callbacks to .join() for custom behavior on each phase." },
      { time: 272, text: "Let me give a concrete example. Say you have an array of five numbers and you want to make a bar chart. You'd do d3.selectAll('rect').data(myArray).join('rect'), and then chain on your .attr() calls to set x, y, width, height." },
      { time: 292, text: "And here's the beautiful part. Inside those .attr() calls, you can pass a function instead of a value. That function receives the data point and its index. So .attr('height', d => d * 10) makes each bar's height proportional to its data value." },
      { time: 312, text: "That function signature, (d, i), comes up constantly in D3. d is the datum, the data point bound to that element. i is the index. You'll use these everywhere." },
      { time: 326, text: "One thing that tripped me up early on: when you first binddata to elements that don't exist yet, you select elements that aren't there. Like selectAll('circle') when there are zero circles. That felt so weird." },
      { time: 342, text: "Right! It's the 'select nothing' pattern. You're not selecting existing circles. You're declaring your intent: 'I want circles to represent my data.' The empty selection becomes the enter selection after .data(), and then you create the actual elements." },
      { time: 362, text: "It's declarative thinking. You describe what the end state should look like, not the step-by-step imperative instructions. Coming from vanilla JS, that's a big mental shift." },
      { time: 378, text: "There's one more concept I want to hit: key functions. By default, D3 matches data to elements by index. First data point goes to first element, second to second, and so on. But you can pass a key function as the second argument to .data()." },
      { time: 398, text: "Why would you need that?" },
      { time: 402, text: "Object identity. Imagine you have a list of countries and you remove one from the middle. Without a key function, D3 thinks the last element is the one that was removed because it matches by index. With a key function like d => d.name, D3 correctly identifies which specific country was removed." },
      { time: 424, text: "Oh, that's crucial for animations. If you're transitioning elements and you want the right element to animate out, you need key functions." },
      { time: 436, text: "Exactly. Keys become essential once you add transitions and want smooth, meaningful animations. We'll cover that in a future episode, but it's good to know about keys now." },
      { time: 450, text: "So to wrap up: D3 selections are wrappers around DOM elements with a chainable API. Data binding connects arrays to elements using .data(). The enter-update-exit pattern handles mismatches. And .join() simplifies the common case." },
      { time: 470, text: "The mental model is: select your target elements, bind your data, and let D3 figure out the diff. It's almost like React's virtual DOM, but for SVG. Once this clicks, you can build any visualization. Next time, we'll look at scales and axes." },
      { time: 490, text: "Great episode. If you're following along, try binding a simple array to some divs or rects and experiment with enter and exit. See you next time!" }
    ];
