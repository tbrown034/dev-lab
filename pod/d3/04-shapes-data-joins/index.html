  <script>
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const TRANSCRIPT = [
      { time: 0, text: "Welcome back to The Pod. I'm Alex, and today we're putting everything together. We've covered SVG, selections, data binding, and scales. Now it's time to build actual shapes with data joins." },
      { time: 16, text: "I'm Sam, and this is the episode where D3 starts feeling like a real tool rather than an abstract concept. We're going to build things you can actually see on screen." },
      { time: 28, text: "Let's start with D3's shape generators. These are functions that take data and spit out SVG path strings. The big ones are d3.line, d3.area, d3.arc, and d3.pie." },
      { time: 42, text: "d3.line is probably the one people encounter first. You create a line generator, tell it how to get x and y from each data point, and it produces a path string you can plug into an SVG path element's d attribute." },
      { time: 58, text: "So you'd write something like const line = d3.line().x(d => xScale(d.date)).y(d => yScale(d.value)). Then you set a path's d attribute to line(data), and boom, you have a line chart." },
      { time: 76, text: "d3.area is similar but it fills the space between two y values. You define y0 for the baseline, usually the bottom of the chart, and y1 for the top of the area. It's great for showing volume or filled line charts." },
      { time: 92, text: "What about pie charts and donut charts?" },
      { time: 96, text: "That's d3.pie and d3.arc working together. d3.pie takes your data array and computes start and end angles for each slice. d3.arc takes those angles and generates the SVG path for each wedge." },
      { time: 114, text: "So pie does the math, arc does the drawing. You can set innerRadius to create a donut chart, or keep it at zero for a traditional pie. padAngle adds gaps between slices, cornerRadius rounds the edges." },
      { time: 132, text: "Now let's talk about putting these together with data joins. The real power of D3 is that your visualizations can update when data changes. That's where the join pattern shines." },
      { time: 146, text: "Right. Let's say you have a bar chart and every second, new data comes in. You call your update function, rebind the new data, and use .join() to handle the transitions. New bars fade in, old bars fade out, existing bars slide to their new positions." },
      { time: 166, text: "Let's walk through a concrete example. A dynamic bar chart. You have an update function that takes an array of values. Inside, you select all rects, bind the data with a key function, and call .join() with three callbacks." },
      { time: 184, text: "The enter callback creates new rects, positions them, and maybe starts them with zero height so they can animate in. The update callback transitions existing rects to their new positions and heights. The exit callback fades out and removes departing rects." },
      { time: 204, text: "And this is where transitions come in. Instead of immediately setting attributes, you chain .transition().duration(750) before your .attr() calls, and D3 smoothly interpolates between the old and new values." },
      { time: 222, text: "Transitions are one of D3's killer features. They handle the tweening automatically. Moving a bar from x=100 to x=200 over 750 milliseconds? D3 figures out every intermediate frame." },
      { time: 238, text: "You can also sequence transitions using .transition() on an existing transition. And .delay() lets you stagger animations, like having bars animate in one by one from left to right." },
      { time: 254, text: "The staggering effect is so satisfying. Something like .delay((d, i) => i * 50) gives each bar a slightly later start time based on its index. It creates that cascading wave effect." },
      { time: 270, text: "Let's talk about curve interpolation too. For line generators, you can set .curve() to control how points are connected. d3.curveLinear gives straight lines between points, d3.curveMonotoneX gives smooth curves that pass through each point." },
      { time: 290, text: "There are a ton of curve types. curveBasis is really smooth but doesn't pass through the points exactly. curveStep creates a step function. curveCardinal gives you tension control. It depends on what your data represents." },
      { time: 308, text: "And here's a practical tip: when building a line chart with data joins, the line itself is usually a single path element that gets redrawn when data changes. You're not joining data to individual line segments. You join the full dataset to one path." },
      { time: 328, text: "That's different from bar charts where each data point is its own rect. For lines, the whole path is one element. For scatter plots, each point is its own circle. The shape determines how you structure the join." },
      { time: 346, text: "One more thing about data joins that I want to emphasize: the merge pattern. In older D3 code, you'd see enter().append() followed by .merge(update) to combine the enter and update selections. With .join(), this is handled automatically." },
      { time: 366, text: "If you're reading older D3 examples online, knowing about merge helps you translate v4/v5 patterns into modern v7 code. Most of the time, .join() is all you need." },
      { time: 380, text: "To recap: D3 has shape generators for lines, areas, arcs, and more. Data joins with .join() handle creating, updating, and removing elements. Transitions make changes animate smoothly. And curves control how points connect." },
      { time: 400, text: "Next episode, we're going to the map. Literally. We'll cover geographic projections, GeoJSON, and building choropleth maps. It's one of D3's most impressive capabilities." },
      { time: 414, text: "Can't wait. Maps are where D3 really blows people's minds. See you there, everyone!" }
    ];
  </script>
