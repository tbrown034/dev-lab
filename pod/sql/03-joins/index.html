  <script>
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const TRANSCRIPT = [
      { time: 0, text: "Welcome back to The Pod. I'm Alex, and today we're tackling the topic that separates SQL beginners from SQL practitioners: joins. Joins are how you connect data across multiple tables, and they're the whole reason relational databases exist." },
      { time: 18, text: "I'm Sam, and I remember joins being the concept that made SQL click for me. Once you understand joins, you start seeing relationships in data everywhere. It's like learning to read." },
      { time: 30, text: "Let's set the scene. You have a users table and an orders table. Each order has a user_id that tells you which user placed it. A join lets you combine these tables, giving you each order alongside the user's name, email, whatever you need." },
      { time: 48, text: "The syntax is SELECT columns FROM table1 JOIN table2 ON table1.column = table2.column. The ON clause is the condition that connects the tables. It's usually matching a foreign key to a primary key." },
      { time: 66, text: "Let's start with INNER JOIN, which is the default. When you just write JOIN, it's an inner join. It returns only rows where there's a match in both tables. If a user has no orders, they don't appear. If an order somehow has no matching user, it doesn't appear either." },
      { time: 86, text: "Think of it like a Venn diagram. Inner join returns only the overlapping middle section. Both sides must have a match." },
      { time: 96, text: "So SELECT users.name, orders.total FROM users JOIN orders ON users.id = orders.user_id gives you every user-order combination where the user exists and the order exists. Users without orders are invisible." },
      { time: 116, text: "Now, LEFT JOIN. This is probably the most commonly used join after inner join. A left join returns all rows from the left table, whether or not there's a match in the right table. If there's no match, the right side columns are NULL." },
      { time: 136, text: "So if you want all users, including those who've never ordered, you'd use LEFT JOIN. SELECT users.name, orders.total FROM users LEFT JOIN orders ON users.id = orders.user_id. Users without orders show up with NULL for the order total." },
      { time: 156, text: "That's incredibly useful. You can even find users without orders by adding WHERE orders.id IS NULL. The left join keeps them, and the WHERE clause filters to only the ones with no match." },
      { time: 172, text: "RIGHT JOIN is the mirror image. It keeps all rows from the right table and fills in NULLs for unmatched rows from the left. Honestly, you can always rewrite a right join as a left join by swapping the table order, so most people just use left joins." },
      { time: 192, text: "Is there a reason to ever use RIGHT JOIN then?" },
      { time: 198, text: "Readability, sometimes. If you're building a complex query and the 'main' table ends up on the right side, a right join reads more naturally than reordering everything. But in practice, I'd say 95% of developers just use left join and adjust the table order." },
      { time: 218, text: "FULL OUTER JOIN is the most inclusive. It returns all rows from both tables. Rows with matches are combined. Rows from the left with no right match have NULLs on the right. Rows from the right with no left match have NULLs on the left." },
      { time: 238, text: "Full outer joins are rare but useful for finding discrepancies. Like comparing two data sources to find records that exist in one but not the other. It shows you the complete picture." },
      { time: 254, text: "There's also CROSS JOIN, which is the Cartesian product. Every row from the left table paired with every row from the right. If you have 100 users and 50 products, a cross join gives you 5,000 rows. Every possible combination." },
      { time: 274, text: "That sounds like it could get out of control fast." },
      { time: 278, text: "It can! Cross joins are rarely what you want. But they have use cases, like generating a grid of all possible date-product combinations for a sales report where some combinations might have zero sales." },
      { time: 296, text: "Let's talk about self joins. That's when you join a table to itself. It sounds weird, but it's useful. Imagine an employees table where each employee has a manager_id that references another employee. A self join lets you get each employee with their manager's name." },
      { time: 316, text: "SELECT e.name AS employee, m.name AS manager FROM employees e JOIN employees m ON e.manager_id = m.id. You use aliases, e and m, to treat the same table as two different tables. It's elegant once you see it." },
      { time: 338, text: "Joining more than two tables is common too. You just chain joins. FROM users JOIN orders ON users.id = orders.user_id JOIN order_items ON orders.id = order_items.order_id JOIN products ON order_items.product_id = products.id. Four tables, three joins." },
      { time: 360, text: "Each JOIN connects to a table that's already in the query. It's like building a chain link by link. Users to orders, orders to order items, order items to products." },
      { time: 376, text: "Let's talk about performance briefly. Joins on properly indexed columns are fast, even on millions of rows. The key is making sure the columns in your ON clause have indexes. Foreign keys usually get indexes automatically, but it's worth checking." },
      { time: 396, text: "And when you're joining multiple tables, the order can matter for performance. The database's query optimizer usually figures out the best order, but for complex queries, you might need to use EXPLAIN to see the execution plan." },
      { time: 414, text: "One common gotcha: joining without an ON clause or with the wrong condition. If you accidentally do a cross join when you meant an inner join, you'll get millions of rows and probably crash your query. Always double-check your join conditions." },
      { time: 432, text: "Also watch out for duplicate rows. If a user has three orders and you join users to orders, that user appears three times. That's correct behavior, not a bug, but it can surprise you if you're counting or summing." },
      { time: 450, text: "To summarize: INNER JOIN for matching rows only, LEFT JOIN for all rows from the left table, RIGHT JOIN for all rows from the right, FULL OUTER for everything, and CROSS for all combinations. Self joins connect a table to itself, and you can chain as many joins as you need." },
      { time: 472, text: "Joins are what make relational databases relational. They let you ask complex questions that span multiple entities. That wraps up the SQL track for now. Thanks for listening, everyone!" }
    ];
  </script>
