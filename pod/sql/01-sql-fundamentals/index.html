  <script>
    const toggle = document.querySelector('.theme-toggle');
    const saved = localStorage.getItem('theme');
    if (saved) {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
      document.documentElement.setAttribute('data-theme', 'light');
    }
    toggle.addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });

    const TRANSCRIPT = [
      { time: 0, text: "Welcome to The Pod. I'm Alex, and we're starting the SQL track today. SQL is one of those technologies that's been around since the 1970s and somehow keeps getting more important, not less." },
      { time: 14, text: "I'm Sam, and I think SQL is honestly the most underrated skill in programming. Every web app, every mobile app, every data pipeline, they all talk to a database, and most of those databases speak SQL." },
      { time: 28, text: "Let's start with the mental model. A relational database stores data in tables. Think of a table like a spreadsheet. Columns are the fields, like name, email, age. Rows are the records, each one representing a specific entity like a person." },
      { time: 46, text: "But unlike a spreadsheet, every column has a strict type. The age column only accepts integers. The email column only accepts strings. The database enforces these rules. You can't accidentally put someone's name in the age field." },
      { time: 62, text: "That strictness is actually a superpower. In JavaScript or Python, you might accidentally store a string where you meant a number and not find the bug until production. SQL databases catch those errors immediately." },
      { time: 78, text: "Now, why is it called 'relational'? It's not about relationships between tables, though those exist. It's based on mathematical relations. Each table is a relation, each row is a tuple, each column is an attribute. The whole thing has a formal mathematical foundation." },
      { time: 98, text: "In practice though, the relationships between tables are what make relational databases powerful. A users table and an orders table are connected by a user_id. That connection lets you answer questions like 'show me all orders for this user' or 'which users have never ordered.'" },
      { time: 118, text: "Let's talk about keys. Every table should have a primary key, a column or set of columns that uniquely identifies each row. Usually it's an auto-incrementing integer called id. No two rows can have the same primary key." },
      { time: 136, text: "And a foreign key is a column in one table that references the primary key of another table. That order_id column in the order_items table? That's a foreign key pointing to the orders table. It's how tables link together." },
      { time: 154, text: "How does SQL compare to something like MongoDB or other NoSQL databases?" },
      { time: 160, text: "NoSQL databases like MongoDB store documents, essentially JSON blobs. They're flexible because there's no fixed schema. But SQL databases give you data integrity, complex queries, and transactions. For most applications, especially ones with structured data and relationships, SQL is the better choice." },
      { time: 182, text: "Let's cover the basic data types. INTEGER for whole numbers. VARCHAR or TEXT for strings. BOOLEAN for true/false. DATE and TIMESTAMP for dates and times. DECIMAL or NUMERIC for precise numbers like money. And NULL, which represents missing or unknown data." },
      { time: 204, text: "NULL is a concept that trips people up. NULL isn't zero, it isn't empty string, it isn't false. It's the absence of a value. And it has weird behavior: NULL equals NULL is not true, it's NULL. You have to use IS NULL to check for it." },
      { time: 224, text: "The four fundamental operations in SQL are often called CRUD: Create, Read, Update, Delete. In SQL, those map to INSERT, SELECT, UPDATE, and DELETE statements." },
      { time: 240, text: "INSERT adds new rows: INSERT INTO users (name, email) VALUES ('Alex', 'alex@example.com'). SELECT reads data. UPDATE modifies existing rows. DELETE removes rows. Those four cover probably 95% of what you'll do." },
      { time: 260, text: "CREATE TABLE is how you define the structure of a table. You specify each column, its type, and any constraints. Like NOT NULL means the column must have a value, UNIQUE means no duplicates, DEFAULT sets a fallback value." },
      { time: 278, text: "Constraints are one of SQL's best features. They're rules the database enforces automatically. A UNIQUE constraint on email means the database rejects a second user with the same email. You don't need application code to check for duplicates." },
      { time: 296, text: "Let's talk about normalization briefly. It's the practice of organizing data to reduce redundancy. Instead of storing a customer's address in every order, you store it once in the customers table and reference it. This prevents inconsistencies." },
      { time: 314, text: "Think of it this way: if a customer's address changes, you update it in one place, not in every order they've ever made. That's the power of normalization. Data lives in one place, and everything else points to it." },
      { time: 330, text: "One last thing for fundamentals: SQL is declarative. You tell the database what you want, not how to get it. SELECT name FROM users WHERE age > 30 says 'give me names of users over 30.' The database figures out the most efficient way to find that data." },
      { time: 350, text: "That's a big difference from imperative programming. You're not writing loops to scan through records. The database engine optimizes the query for you. That's why SQL databases can handle millions of rows efficiently." },
      { time: 366, text: "To summarize: SQL databases store data in typed, structured tables. Primary keys identify rows, foreign keys connect tables. CRUD operations are INSERT, SELECT, UPDATE, DELETE. And the database enforces data integrity through types and constraints." },
      { time: 386, text: "Next episode, we'll write our first real queries. SELECT and filtering with WHERE. That's where SQL starts to feel powerful. See you there!" }
    ];
  </script>
