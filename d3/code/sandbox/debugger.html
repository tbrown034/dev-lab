<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visual Debugger - Learn D3</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/assets/base.css">
  <style>
    .header {
      padding: 1rem 2rem;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.3rem; font-weight: 600; }
    .header h1 span { color: #818cf8; }
    .header .links { display: flex; gap: 1rem; }
    .header .links a {
      color: #888; text-decoration: none; font-size: 0.85rem;
      transition: color 0.2s;
    }
    .header .links a:hover { color: #f97316; }
    .toolbar {
      padding: 0.75rem 2rem;
      border-bottom: 1px solid #222;
      display: flex;
      gap: 1rem;
      align-items: center;
      background: #111;
    }
    .toolbar label { color: #888; font-size: 0.85rem; }
    .toolbar select {
      background: #1a1a1a; color: #e5e5e5; border: 1px solid #333;
      border-radius: 4px; padding: 0.4rem 0.75rem; font-size: 0.85rem;
    }
    .toolbar button {
      background: #1a1a1a; color: #ccc; border: 1px solid #333;
      border-radius: 4px; padding: 0.5rem 1.2rem; font-size: 0.85rem;
      cursor: pointer; transition: all 0.2s;
    }
    .toolbar button:hover { background: #818cf8; color: #000; border-color: #818cf8; }
    .toolbar button.step-btn {
      background: #818cf8; color: #000; border-color: #818cf8; font-weight: 600;
    }
    .toolbar button.step-btn:hover { background: #a5b4fc; }
    .toolbar .step-info {
      color: #888; font-size: 0.8rem; margin-left: auto;
    }
    .content {
      display: flex;
      height: calc(100vh - 110px);
    }
    .code-panel {
      width: 45%;
      border-right: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .code-panel .panel-label {
      padding: 0.5rem 1rem;
      font-size: 0.75rem; color: #666;
      text-transform: uppercase; letter-spacing: 0.05em;
      background: #111; border-bottom: 1px solid #222;
    }
    .code-lines {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      line-height: 1.7;
    }
    .code-line {
      padding: 0 1rem 0 0;
      display: flex;
      border-left: 3px solid transparent;
      transition: all 0.3s;
    }
    .code-line .line-num {
      display: inline-block;
      width: 40px;
      text-align: right;
      padding-right: 12px;
      color: #444;
      user-select: none;
      flex-shrink: 0;
    }
    .code-line .line-text {
      white-space: pre;
      flex: 1;
    }
    .code-line.active {
      background: #818cf822;
      border-left-color: #818cf8;
    }
    .code-line.done {
      background: #4ade8010;
      border-left-color: #4ade8066;
    }
    .right-panel {
      width: 55%;
      display: flex;
      flex-direction: column;
    }
    .svg-panel {
      flex: 1;
      overflow: auto;
      padding: 1.5rem;
      background: #0e0e0e;
    }
    .svg-panel svg {
      background: #1a1a1a;
      border-radius: 6px;
    }
    .annotation-panel {
      height: 220px;
      border-top: 1px solid #222;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .annotation-panel .panel-label {
      padding: 0.5rem 1rem;
      font-size: 0.75rem; color: #666;
      text-transform: uppercase; letter-spacing: 0.05em;
      background: #111; border-bottom: 1px solid #222;
      flex-shrink: 0;
    }
    .annotations {
      flex: 1;
      overflow-y: auto;
      padding: 0.75rem 1rem;
    }
    .annotation {
      padding: 0.5rem 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.5;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
    .annotation.info { background: #818cf815; border-left: 3px solid #818cf8; }
    .annotation.enter { background: #4ade8015; border-left: 3px solid #4ade80; }
    .annotation.update { background: #60a5fa15; border-left: 3px solid #60a5fa; }
    .annotation.exit { background: #f472b615; border-left: 3px solid #f472b6; }
    .annotation code {
      background: #ffffff10;
      padding: 0.1em 0.3em;
      border-radius: 3px;
      font-size: 0.8rem;
    }
    .data-panel {
      padding: 0.75rem 1rem;
      border-top: 1px solid #222;
      background: #0e0e0e;
      flex-shrink: 0;
    }
    .data-panel h4 {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    .data-items {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .data-item {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.3rem 0.6rem;
      font-size: 0.75rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .data-item.entering { border-color: #4ade80; color: #4ade80; }
    .data-item.updating { border-color: #60a5fa; color: #60a5fa; }
    .data-item.exiting { border-color: #f472b6; color: #f472b6; }

    /* Color legend */
    .legend {
      display: flex;
      gap: 1.5rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #222;
      background: #0e0e0e;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: #888;
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .legend-dot.enter { background: #4ade80; }
    .legend-dot.update { background: #60a5fa; }
    .legend-dot.exit { background: #f472b6; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Visual <span>Debugger</span></h1>
    <div class="links">
      <a href="/d3/">Home</a>
      <a href="/d3/code/sandbox/">Sandbox</a>
      <a href="/d3/references/snippets/">Snippets</a>
    </div>
  </div>

  <div class="toolbar">
    <label>Example:</label>
    <select id="example-select">
      <option value="bar-chart">Bar Chart</option>
      <option value="enter-exit">Data Update (Enter/Exit)</option>
      <option value="scales-axes">Scales + Axes</option>
    </select>
    <button id="step-btn" class="step-btn">Step</button>
    <button id="reset-btn">Reset</button>
    <button id="play-btn">Auto-Play</button>
    <span class="step-info" id="step-info">Step 0 / 0</span>
  </div>

  <div class="content">
    <div class="code-panel">
      <div class="panel-label">D3 Code</div>
      <div class="code-lines" id="code-lines"></div>
    </div>
    <div class="right-panel">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot enter"></div> Enter (new)</div>
        <div class="legend-item"><div class="legend-dot update"></div> Update (existing)</div>
        <div class="legend-item"><div class="legend-dot exit"></div> Exit (removed)</div>
      </div>
      <div class="svg-panel" id="svg-panel"></div>
      <div class="data-panel" id="data-panel">
        <h4>Element __data__</h4>
        <div class="data-items" id="data-items"></div>
      </div>
      <div class="annotation-panel">
        <div class="panel-label">What happened</div>
        <div class="annotations" id="annotations"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/components/init-tutor.js"></script>

  <script type="module">
    import * as d3 from "d3";

    // ---- Example definitions ----
    const examples = {
      "bar-chart": {
        code: [
          `const data = [40, 80, 45, 60, 20];`,
          ``,
          `const svg = d3.select("#svg-panel")`,
          `  .append("svg")`,
          `  .attr("width", 400)`,
          `  .attr("height", 250);`,
          ``,
          `const x = d3.scaleBand()`,
          `  .domain(d3.range(data.length))`,
          `  .range([40, 380])`,
          `  .padding(0.2);`,
          ``,
          `const y = d3.scaleLinear()`,
          `  .domain([0, d3.max(data)])`,
          `  .range([220, 20]);`,
          ``,
          `svg.selectAll("rect")`,
          `  .data(data)`,
          `  .join("rect")`,
          `  .attr("x", (d, i) => x(i))`,
          `  .attr("y", d => y(d))`,
          `  .attr("width", x.bandwidth())`,
          `  .attr("height", d => 220 - y(d))`,
          `  .attr("fill", "#f97316");`,
          ``,
          `svg.append("g")`,
          `  .attr("transform", "translate(0,220)")`,
          `  .call(d3.axisBottom(x));`,
          ``,
          `svg.append("g")`,
          `  .attr("transform", "translate(40,0)")`,
          `  .call(d3.axisLeft(y).ticks(5));`,
        ],
        steps: [
          {
            lines: [0], type: "info",
            annotation: "Defined data array with <code>5 values: [40, 80, 45, 60, 20]</code>.",
            action: (svg) => {},
            dataItems: [
              { text: "40", cls: "" }, { text: "80", cls: "" },
              { text: "45", cls: "" }, { text: "60", cls: "" }, { text: "20", cls: "" }
            ],
          },
          {
            lines: [2, 3, 4, 5], type: "info",
            annotation: "Created an <code>&lt;svg&gt;</code> element (400 x 250) inside the preview panel.",
            action: (svg) => {
              return d3.select("#svg-panel").append("svg")
                .attr("width", 400).attr("height", 250)
                .style("background", "#1a1a1a").style("border-radius", "6px");
            },
            dataItems: [],
          },
          {
            lines: [7, 8, 9, 10], type: "info",
            annotation: "Created a <code>scaleBand</code> for x-axis. Maps indices [0..4] to pixel range [40..380] with 0.2 padding.",
            action: () => {},
            dataItems: [],
          },
          {
            lines: [12, 13, 14], type: "info",
            annotation: "Created a <code>scaleLinear</code> for y-axis. Maps data domain [0..80] to pixel range [220..20] (inverted because SVG y goes downward).",
            action: () => {},
            dataItems: [],
          },
          {
            lines: [16], type: "info",
            annotation: "<code>selectAll(\"rect\")</code> selected all existing rects: <strong>0 found</strong>. This is the \"empty selection\" pattern -- we're selecting elements that don't exist yet.",
            action: () => {},
            dataItems: [],
          },
          {
            lines: [17], type: "enter",
            annotation: "<code>.data(data)</code> bound 5 data values to the selection. Since there are 0 existing elements and 5 data items, all 5 go into the <strong>enter</strong> selection.",
            action: () => {},
            dataItems: [
              { text: "40 (enter)", cls: "entering" }, { text: "80 (enter)", cls: "entering" },
              { text: "45 (enter)", cls: "entering" }, { text: "60 (enter)", cls: "entering" },
              { text: "20 (enter)", cls: "entering" },
            ],
          },
          {
            lines: [18], type: "enter",
            annotation: "<code>.join(\"rect\")</code> created <strong>5 new &lt;rect&gt; elements</strong>, one for each data item in the enter selection. They exist in the DOM now but have no position or size yet.",
            action: () => {
              const svg = d3.select("#svg-panel svg");
              svg.selectAll("rect.bar").data([40, 80, 45, 60, 20]).join("rect")
                .attr("class", "bar")
                .attr("x", 0).attr("y", 0).attr("width", 0).attr("height", 0)
                .attr("fill", "#4ade80").attr("opacity", 0.3);
            },
            dataItems: [
              { text: "rect[0].__data__ = 40", cls: "entering" },
              { text: "rect[1].__data__ = 80", cls: "entering" },
              { text: "rect[2].__data__ = 45", cls: "entering" },
              { text: "rect[3].__data__ = 60", cls: "entering" },
              { text: "rect[4].__data__ = 20", cls: "entering" },
            ],
          },
          {
            lines: [19], type: "enter",
            annotation: "<code>.attr(\"x\", ...)</code> set the x position of each rect using the band scale. Each rect gets placed at its band position.",
            action: () => {
              const x = d3.scaleBand().domain(d3.range(5)).range([40, 380]).padding(0.2);
              d3.select("#svg-panel svg").selectAll("rect.bar")
                .attr("x", (d, i) => x(i)).attr("width", x.bandwidth())
                .attr("fill", "#4ade80").attr("opacity", 0.5);
            },
            dataItems: [],
          },
          {
            lines: [20, 21, 22], type: "enter",
            annotation: "<code>.attr(\"y\", ...) + .attr(\"height\", ...)</code> set vertical position and height. The y scale maps data values to pixel positions. Bars grow <strong>upward</strong> from the baseline.",
            action: () => {
              const x = d3.scaleBand().domain(d3.range(5)).range([40, 380]).padding(0.2);
              const y = d3.scaleLinear().domain([0, 80]).range([220, 20]);
              d3.select("#svg-panel svg").selectAll("rect.bar")
                .attr("y", d => y(d))
                .attr("height", d => 220 - y(d))
                .attr("fill", "#4ade80").attr("opacity", 0.7);
            },
            dataItems: [],
          },
          {
            lines: [23], type: "info",
            annotation: "<code>.attr(\"fill\", \"#f97316\")</code> set the fill color to orange on all 5 bars.",
            action: () => {
              d3.select("#svg-panel svg").selectAll("rect.bar")
                .attr("fill", "#f97316").attr("opacity", 1);
            },
            dataItems: [],
          },
          {
            lines: [25, 26, 27], type: "info",
            annotation: "Created a <code>&lt;g&gt;</code> group element at y=220, then called <code>axisBottom(x)</code> which generates tick marks and labels along the x-axis.",
            action: () => {
              const x = d3.scaleBand().domain(d3.range(5)).range([40, 380]).padding(0.2);
              const svg = d3.select("#svg-panel svg");
              svg.append("g").attr("transform", "translate(0,220)").call(d3.axisBottom(x))
                .selectAll("text").attr("fill", "#aaa");
              svg.selectAll(".domain, .tick line").attr("stroke", "#444");
            },
            dataItems: [],
          },
          {
            lines: [29, 30, 31], type: "info",
            annotation: "Created another <code>&lt;g&gt;</code> at x=40, called <code>axisLeft(y)</code> to generate the y-axis with 5 ticks. The chart is complete!",
            action: () => {
              const y = d3.scaleLinear().domain([0, 80]).range([220, 20]);
              const svg = d3.select("#svg-panel svg");
              svg.append("g").attr("transform", "translate(40,0)").call(d3.axisLeft(y).ticks(5))
                .selectAll("text").attr("fill", "#aaa");
              svg.selectAll(".domain, .tick line").attr("stroke", "#444");
            },
            dataItems: [
              { text: "rect[0].__data__ = 40", cls: "" },
              { text: "rect[1].__data__ = 80", cls: "" },
              { text: "rect[2].__data__ = 45", cls: "" },
              { text: "rect[3].__data__ = 60", cls: "" },
              { text: "rect[4].__data__ = 20", cls: "" },
            ],
          },
        ],
      },

      "enter-exit": {
        code: [
          `// PHASE 1: Initial render with [10, 20, 30]`,
          `const svg = d3.select("#svg-panel")`,
          `  .append("svg")`,
          `  .attr("width", 400)`,
          `  .attr("height", 200);`,
          ``,
          `let data = [10, 20, 30];`,
          ``,
          `svg.selectAll("circle")`,
          `  .data(data)`,
          `  .join("circle")`,
          `  .attr("cx", (d, i) => 80 + i * 100)`,
          `  .attr("cy", 100)`,
          `  .attr("r", d => d)`,
          `  .attr("fill", "#4ade80");`,
          ``,
          `// PHASE 2: Update data to [10, 50, 30, 40]`,
          `data = [10, 50, 30, 40];`,
          ``,
          `svg.selectAll("circle")`,
          `  .data(data)`,
          `  .join(`,
          `    enter => enter.append("circle")`,
          `      .attr("fill", "#4ade80"),  // green = new`,
          `    update => update`,
          `      .attr("fill", "#60a5fa"),  // blue = updated`,
          `    exit => exit`,
          `      .attr("fill", "#f472b6")   // pink = leaving`,
          `      .remove()`,
          `  )`,
          `  .attr("cx", (d, i) => 80 + i * 100)`,
          `  .attr("cy", 100)`,
          `  .attr("r", d => d);`,
        ],
        steps: [
          {
            lines: [1, 2, 3, 4], type: "info",
            annotation: "Created an <code>&lt;svg&gt;</code> (400 x 200) to hold our circles.",
            action: () => {
              return d3.select("#svg-panel").append("svg")
                .attr("width", 400).attr("height", 200)
                .style("background", "#1a1a1a").style("border-radius", "6px");
            },
            dataItems: [],
          },
          {
            lines: [6], type: "info",
            annotation: "Initial data: <code>[10, 20, 30]</code> -- three values representing circle radii.",
            action: () => {},
            dataItems: [
              { text: "10", cls: "" }, { text: "20", cls: "" }, { text: "30", cls: "" },
            ],
          },
          {
            lines: [8, 9, 10], type: "enter",
            annotation: "<code>selectAll(\"circle\")</code> finds 0 circles. <code>.data([10,20,30])</code> binds 3 items. <code>.join(\"circle\")</code> creates <strong>3 new circles</strong> (all in the enter selection).",
            action: () => {
              const svg = d3.select("#svg-panel svg");
              svg.selectAll("circle").data([10, 20, 30]).join("circle")
                .attr("cx", (d, i) => 80 + i * 100)
                .attr("cy", 100).attr("r", d => d)
                .attr("fill", "#4ade80").attr("stroke", "#4ade80").attr("stroke-width", 2);
            },
            dataItems: [
              { text: "circle[0].__data__ = 10", cls: "entering" },
              { text: "circle[1].__data__ = 20", cls: "entering" },
              { text: "circle[2].__data__ = 30", cls: "entering" },
            ],
          },
          {
            lines: [11, 12, 13, 14], type: "enter",
            annotation: "Set positions: <code>cx</code> spaced 100px apart, <code>cy</code> centered at 100, <code>r</code> = data value. Fill is <strong style='color:#4ade80'>green</strong> (new elements).",
            action: () => {},
            dataItems: [],
          },
          {
            lines: [16, 17], type: "info",
            annotation: "Data changed! <code>[10, 50, 30, 40]</code> -- index 1 changed (20 -> 50), index 3 is brand new (40). Comparing with previous [10, 20, 30]...",
            action: () => {},
            dataItems: [
              { text: "10 (same)", cls: "" },
              { text: "50 (was 20)", cls: "updating" },
              { text: "30 (same)", cls: "" },
              { text: "40 (new!)", cls: "entering" },
            ],
          },
          {
            lines: [19, 20], type: "update",
            annotation: "<code>selectAll(\"circle\")</code> now finds 3 existing circles. <code>.data([10,50,30,40])</code> binds 4 items. Result: 3 go to <strong>update</strong>, 1 goes to <strong>enter</strong>, 0 to exit.",
            action: () => {},
            dataItems: [
              { text: "circle[0] = update (10)", cls: "updating" },
              { text: "circle[1] = update (50)", cls: "updating" },
              { text: "circle[2] = update (30)", cls: "updating" },
              { text: "circle[3] = enter (40)", cls: "entering" },
            ],
          },
          {
            lines: [21, 22, 23, 24, 25, 26, 27, 28, 29], type: "enter",
            annotation: "<code>.join(enter, update, exit)</code> with callbacks: enter elements get <strong style='color:#4ade80'>green</strong> fill, update elements get <strong style='color:#60a5fa'>blue</strong> fill, exit elements get <strong style='color:#f472b6'>pink</strong> fill then are removed.",
            action: () => {
              const svg = d3.select("#svg-panel svg");
              svg.selectAll("circle").data([10, 50, 30, 40])
                .join(
                  enter => enter.append("circle").attr("fill", "#4ade80").attr("stroke", "#4ade80").attr("stroke-width", 2),
                  update => update.attr("fill", "#60a5fa").attr("stroke", "#60a5fa").attr("stroke-width", 2),
                  exit => exit.remove()
                )
                .attr("cx", (d, i) => 80 + i * 100)
                .attr("cy", 100)
                .attr("r", d => d);
            },
            dataItems: [
              { text: "circle[0].__data__ = 10 (update)", cls: "updating" },
              { text: "circle[1].__data__ = 50 (update)", cls: "updating" },
              { text: "circle[2].__data__ = 30 (update)", cls: "updating" },
              { text: "circle[3].__data__ = 40 (enter)", cls: "entering" },
            ],
          },
          {
            lines: [30, 31, 32], type: "info",
            annotation: "Final attributes applied to <strong>all</strong> elements (enter + update merged). Circle 4 (radius 40) appeared as <strong style='color:#4ade80'>green</strong>. Circles 1-3 turned <strong style='color:#60a5fa'>blue</strong> to show they were updated.",
            action: () => {},
            dataItems: [],
          },
        ],
      },

      "scales-axes": {
        code: [
          `const data = [`,
          `  { month: "Jan", sales: 120 },`,
          `  { month: "Feb", sales: 200 },`,
          `  { month: "Mar", sales: 150 },`,
          `  { month: "Apr", sales: 280 },`,
          `  { month: "May", sales: 220 },`,
          `];`,
          ``,
          `const margin = { top: 20, right: 20,`,
          `                  bottom: 40, left: 50 };`,
          `const width = 450 - margin.left - margin.right;`,
          `const height = 280 - margin.top - margin.bottom;`,
          ``,
          `const svg = d3.select("#svg-panel")`,
          `  .append("svg")`,
          `  .attr("width", 450)`,
          `  .attr("height", 280)`,
          `  .append("g")`,
          `  .attr("transform",`,
          `    \`translate(\${margin.left},\${margin.top})\`);`,
          ``,
          `const x = d3.scaleBand()`,
          `  .domain(data.map(d => d.month))`,
          `  .range([0, width])`,
          `  .padding(0.3);`,
          `// x("Jan") => 0, x("Feb") => 78, ...`,
          `// x.bandwidth() => 61`,
          ``,
          `const y = d3.scaleLinear()`,
          `  .domain([0, d3.max(data, d => d.sales)])`,
          `  .nice()`,
          `  .range([height, 0]);`,
          `// y(0) => 220, y(280) => 0  (inverted!)`,
          ``,
          `svg.append("g")`,
          `  .attr("transform", \`translate(0,\${height})\`)`,
          `  .call(d3.axisBottom(x));`,
          ``,
          `svg.append("g")`,
          `  .call(d3.axisLeft(y).ticks(5));`,
          ``,
          `svg.selectAll("rect")`,
          `  .data(data)`,
          `  .join("rect")`,
          `  .attr("x", d => x(d.month))`,
          `  .attr("y", d => y(d.sales))`,
          `  .attr("width", x.bandwidth())`,
          `  .attr("height", d => height - y(d.sales))`,
          `  .attr("fill", "#f97316")`,
          `  .attr("rx", 4);`,
        ],
        steps: [
          {
            lines: [0, 1, 2, 3, 4, 5, 6], type: "info",
            annotation: "Data: 5 objects with <code>month</code> (categorical) and <code>sales</code> (numeric). This determines what scales we need.",
            action: () => {},
            dataItems: [
              { text: 'Jan: 120', cls: '' }, { text: 'Feb: 200', cls: '' },
              { text: 'Mar: 150', cls: '' }, { text: 'Apr: 280', cls: '' },
              { text: 'May: 220', cls: '' },
            ],
          },
          {
            lines: [8, 9, 10, 11], type: "info",
            annotation: "The <strong>margin convention</strong>: reserve space for axes by defining top/right/bottom/left margins. Inner dimensions: width=380, height=220.",
            action: () => {},
            dataItems: [],
          },
          {
            lines: [13, 14, 15, 16, 17, 18, 19], type: "info",
            annotation: "Created SVG at full size (450x280), appended a <code>&lt;g&gt;</code> group translated by margins. All subsequent drawing happens inside this shifted group.",
            action: () => {
              return d3.select("#svg-panel").append("svg")
                .attr("width", 450).attr("height", 280)
                .style("background", "#1a1a1a").style("border-radius", "6px")
                .append("g").attr("transform", "translate(50,20)");
            },
            dataItems: [],
          },
          {
            lines: [21, 22, 23, 24, 25, 26], type: "info",
            annotation: "<code>scaleBand()</code> for categorical x-axis. Maps month names to pixel positions: <code>x(\"Jan\")=0, x(\"Feb\")=78, ...</code> Each band is ~61px wide. Padding adds gaps between bars.",
            action: () => {
              // Show scale visualization
              const g = d3.select("#svg-panel svg g");
              const x = d3.scaleBand().domain(["Jan","Feb","Mar","Apr","May"]).range([0, 380]).padding(0.3);
              ["Jan","Feb","Mar","Apr","May"].forEach(m => {
                g.append("rect").attr("x", x(m)).attr("y", 210).attr("width", x.bandwidth()).attr("height", 10)
                  .attr("fill", "#818cf844").attr("stroke", "#818cf8").attr("stroke-dasharray", "3,3");
                g.append("text").attr("x", x(m) + x.bandwidth()/2).attr("y", 208).attr("text-anchor", "middle")
                  .attr("fill", "#818cf8").attr("font-size", "9px").text(`${Math.round(x(m))}px`);
              });
            },
            dataItems: [],
          },
          {
            lines: [28, 29, 30, 31, 32], type: "info",
            annotation: "<code>scaleLinear()</code> for numeric y-axis. Maps [0..280] to [220..0]. <strong>Range is inverted</strong> because SVG y=0 is at the top. <code>.nice()</code> rounds domain to clean numbers (280 -> 300).",
            action: () => {
              // Show y scale indicators
              const g = d3.select("#svg-panel svg g");
              g.selectAll("rect[fill='#818cf844']").remove();
              g.selectAll("text[fill='#818cf8']").remove();
              const y = d3.scaleLinear().domain([0, 280]).nice().range([220, 0]);
              [0, 100, 200, 300].forEach(v => {
                g.append("line").attr("x1", -5).attr("x2", 380)
                  .attr("y1", y(v)).attr("y2", y(v))
                  .attr("stroke", "#818cf844").attr("stroke-dasharray", "3,3").attr("class", "scale-guide");
                g.append("text").attr("x", -10).attr("y", y(v)).attr("dy", "0.35em").attr("text-anchor", "end")
                  .attr("fill", "#818cf8").attr("font-size", "9px").attr("class", "scale-guide").text(`${v} -> ${Math.round(y(v))}px`);
              });
            },
            dataItems: [],
          },
          {
            lines: [34, 35, 36], type: "info",
            annotation: "Called <code>axisBottom(x)</code> which auto-generates tick marks and labels from the scale. Positioned at the bottom via <code>translate(0, 220)</code>.",
            action: () => {
              const g = d3.select("#svg-panel svg g");
              g.selectAll(".scale-guide").remove();
              const x = d3.scaleBand().domain(["Jan","Feb","Mar","Apr","May"]).range([0, 380]).padding(0.3);
              g.append("g").attr("transform", "translate(0,220)").call(d3.axisBottom(x))
                .selectAll("text").attr("fill", "#aaa");
              g.selectAll(".domain, .tick line").attr("stroke", "#444");
            },
            dataItems: [],
          },
          {
            lines: [38, 39], type: "info",
            annotation: "Called <code>axisLeft(y)</code> with 5 ticks. Generates tick lines and labels on the left side. D3 auto-picks nice round numbers for tick values.",
            action: () => {
              const g = d3.select("#svg-panel svg g");
              const y = d3.scaleLinear().domain([0, 280]).nice().range([220, 0]);
              g.append("g").call(d3.axisLeft(y).ticks(5))
                .selectAll("text").attr("fill", "#aaa");
              g.selectAll(".domain, .tick line").attr("stroke", "#444");
            },
            dataItems: [],
          },
          {
            lines: [41, 42, 43, 44, 45, 46, 47, 48, 49], type: "enter",
            annotation: "Created 5 rects, positioned with <strong>both scales</strong>: <code>x(d.month)</code> for horizontal, <code>y(d.sales)</code> for top edge, <code>height - y(d.sales)</code> for bar height. This is the complete chart!",
            action: () => {
              const g = d3.select("#svg-panel svg g");
              const data = [
                { month: "Jan", sales: 120 }, { month: "Feb", sales: 200 },
                { month: "Mar", sales: 150 }, { month: "Apr", sales: 280 },
                { month: "May", sales: 220 },
              ];
              const x = d3.scaleBand().domain(data.map(d=>d.month)).range([0, 380]).padding(0.3);
              const y = d3.scaleLinear().domain([0, 280]).nice().range([220, 0]);
              g.selectAll("rect.bar").data(data).join("rect").attr("class", "bar")
                .attr("x", d => x(d.month)).attr("y", d => y(d.sales))
                .attr("width", x.bandwidth()).attr("height", d => 220 - y(d.sales))
                .attr("fill", "#f97316").attr("rx", 4);
            },
            dataItems: [
              { text: 'x("Jan")=0, y(120)=132', cls: '' },
              { text: 'x("Feb")=78, y(200)=73', cls: '' },
              { text: 'x("Mar")=156, y(150)=110', cls: '' },
              { text: 'x("Apr")=234, y(280)=7', cls: '' },
              { text: 'x("May")=311, y(220)=59', cls: '' },
            ],
          },
        ],
      },
    };

    // ---- Debugger state ----
    let currentExample = "bar-chart";
    let currentStep = -1;
    let autoPlayTimer = null;

    const codeLines = document.getElementById("code-lines");
    const svgPanel = document.getElementById("svg-panel");
    const annotations = document.getElementById("annotations");
    const dataItems = document.getElementById("data-items");
    const stepInfo = document.getElementById("step-info");
    const exampleSelect = document.getElementById("example-select");

    function renderCode(example) {
      codeLines.innerHTML = "";
      example.code.forEach((line, i) => {
        const div = document.createElement("div");
        div.className = "code-line";
        div.dataset.line = i;
        div.innerHTML = `<span class="line-num">${i + 1}</span><span class="line-text">${escapeHtml(line)}</span>`;
        codeLines.appendChild(div);
      });
    }

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function reset() {
      currentStep = -1;
      if (autoPlayTimer) { clearInterval(autoPlayTimer); autoPlayTimer = null; }
      svgPanel.innerHTML = "";
      annotations.innerHTML = "";
      dataItems.innerHTML = "";
      const example = examples[currentExample];
      renderCode(example);
      stepInfo.textContent = `Step 0 / ${example.steps.length}`;
    }

    function step() {
      const example = examples[currentExample];
      if (currentStep >= example.steps.length - 1) {
        if (autoPlayTimer) { clearInterval(autoPlayTimer); autoPlayTimer = null; }
        return;
      }
      currentStep++;
      const s = example.steps[currentStep];

      // Highlight lines
      document.querySelectorAll(".code-line").forEach(el => {
        el.classList.remove("active");
      });
      s.lines.forEach(lineIdx => {
        const el = document.querySelector(`.code-line[data-line="${lineIdx}"]`);
        if (el) {
          el.classList.add("active");
          el.scrollIntoView({ block: "center", behavior: "smooth" });
        }
      });

      // Mark previous lines as done
      for (let i = 0; i < currentStep; i++) {
        examples[currentExample].steps[i].lines.forEach(lineIdx => {
          const el = document.querySelector(`.code-line[data-line="${lineIdx}"]`);
          if (el && !s.lines.includes(lineIdx)) el.classList.add("done");
        });
      }

      // Run action
      if (s.action) s.action();

      // Add annotation
      const ann = document.createElement("div");
      ann.className = `annotation ${s.type}`;
      ann.innerHTML = `<strong>Step ${currentStep + 1}:</strong> ${s.annotation}`;
      annotations.appendChild(ann);
      ann.scrollIntoView({ behavior: "smooth" });

      // Update data items
      if (s.dataItems && s.dataItems.length > 0) {
        dataItems.innerHTML = "";
        s.dataItems.forEach(item => {
          const span = document.createElement("span");
          span.className = `data-item ${item.cls}`;
          span.textContent = item.text;
          dataItems.appendChild(span);
        });
      }

      stepInfo.textContent = `Step ${currentStep + 1} / ${example.steps.length}`;
    }

    // Event handlers
    document.getElementById("step-btn").addEventListener("click", step);
    document.getElementById("reset-btn").addEventListener("click", reset);
    document.getElementById("play-btn").addEventListener("click", () => {
      if (autoPlayTimer) {
        clearInterval(autoPlayTimer);
        autoPlayTimer = null;
        return;
      }
      autoPlayTimer = setInterval(() => {
        if (currentStep >= examples[currentExample].steps.length - 1) {
          clearInterval(autoPlayTimer);
          autoPlayTimer = null;
          return;
        }
        step();
      }, 1500);
    });

    exampleSelect.addEventListener("change", () => {
      currentExample = exampleSelect.value;
      reset();
    });

    // Initialize
    reset();
  </script>
</body>
</html>
