<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Sandbox - Learn D3</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/base.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 1rem 2rem;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .header h1 { font-size: 1.3rem; font-weight: 600; }
    .header h1 span { color: #f97316; }
    .header .links { display: flex; gap: 1rem; align-items: center; }
    .header .links a {
      color: #888;
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .header .links a:hover { color: #f97316; }
    .toolbar {
      padding: 0.75rem 2rem;
      border-bottom: 1px solid #222;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-shrink: 0;
      background: #111;
    }
    .toolbar label { color: #888; font-size: 0.85rem; }
    .toolbar select {
      background: #1a1a1a;
      color: #e5e5e5;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .toolbar select:focus { border-color: #f97316; outline: none; }
    .toolbar button {
      background: #1a1a1a;
      color: #ccc;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toolbar button:hover {
      background: #f97316;
      color: #000;
      border-color: #f97316;
    }
    .toolbar button.run-btn {
      background: #f97316;
      color: #000;
      border-color: #f97316;
      font-weight: 600;
    }
    .toolbar button.run-btn:hover {
      background: #fb923c;
    }
    .panes {
      flex: 1;
      display: flex;
      min-height: 0;
    }
    .editor-pane {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #222;
    }
    .editor-pane .pane-label {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #111;
      border-bottom: 1px solid #222;
    }
    #code-editor {
      flex: 1;
      background: #0d0d0d;
      color: #e5e5e5;
      border: none;
      padding: 1rem;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 13px;
      line-height: 1.6;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    .preview-pane {
      width: 50%;
      display: flex;
      flex-direction: column;
    }
    .preview-pane .pane-label {
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      background: #111;
      border-bottom: 1px solid #222;
    }
    #preview {
      flex: 1;
      background: #141414;
      padding: 1rem;
      overflow: auto;
    }
    #preview svg {
      background: #1a1a1a;
      border-radius: 4px;
    }
    #error-banner {
      display: none;
      background: #3b0a0a;
      border-top: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 0.75rem 1rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      max-height: 120px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .resize-handle {
      width: 4px;
      background: #222;
      cursor: col-resize;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .resize-handle:hover { background: #f97316; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Live <span>Sandbox</span></h1>
    <div class="links">
      <a href="/d3/">Home</a>
      <a href="/d3/code/sandbox/debugger.html">Debugger</a>
      <a href="/d3/references/snippets/">Snippets</a>
    </div>
  </div>

  <div class="toolbar">
    <label>Template:</label>
    <select id="template-select">
      <option value="empty">Empty</option>
      <option value="bar-chart" selected>Bar Chart</option>
      <option value="scatter-plot">Scatter Plot</option>
      <option value="line-chart">Line Chart</option>
      <option value="donut-chart">Donut Chart</option>
      <option value="horizontal-bars">Horizontal Bars</option>
      <option value="grouped-bars">Grouped Bars</option>
      <option value="area-chart">Area Chart</option>
      <option value="us-map">US Map</option>
    </select>
    <button id="reset-btn">Reset</button>
    <button id="run-btn" class="run-btn">Run</button>
    <span style="color: #555; font-size: 0.75rem; margin-left: auto;">Auto-runs as you type (300ms debounce)</span>
  </div>

  <div class="panes">
    <div class="editor-pane" id="editor-pane">
      <div class="pane-label">Code</div>
      <textarea id="code-editor" spellcheck="false"></textarea>
    </div>
    <div class="resize-handle" id="resize-handle"></div>
    <div class="preview-pane" id="preview-pane">
      <div class="pane-label">Preview</div>
      <div id="preview"></div>
      <div id="error-banner"></div>
    </div>
  </div>

  <script type="module" src="/components/init-tutor.js"></script>

  <script type="module">
    import * as d3 from "d3";

    const templates = {
      "empty": `// Start with an empty SVG
const svg = d3.select("#preview")
  .append("svg")
  .attr("width", 600)
  .attr("height", 400)
  .style("background", "#1a1a1a");

// Your D3 code here...
svg.append("text")
  .attr("x", 300)
  .attr("y", 200)
  .attr("text-anchor", "middle")
  .attr("fill", "#888")
  .attr("font-size", "18px")
  .text("Start coding!");
`,

      "bar-chart": `const data = [
  { label: "A", value: 30 },
  { label: "B", value: 80 },
  { label: "C", value: 45 },
  { label: "D", value: 60 },
  { label: "E", value: 20 },
  { label: "F", value: 90 },
  { label: "G", value: 55 },
];

const margin = { top: 20, right: 20, bottom: 30, left: 40 };
const width = 560 - margin.left - margin.right;
const height = 360 - margin.top - margin.bottom;

const svg = d3.select("#preview")
  .append("svg")
  .attr("width", width + margin.left + margin.right)
  .attr("height", height + margin.top + margin.bottom)
  .append("g")
  .attr("transform", \`translate(\${margin.left},\${margin.top})\`);

const x = d3.scaleBand()
  .domain(data.map(d => d.label))
  .range([0, width])
  .padding(0.2);

const y = d3.scaleLinear()
  .domain([0, d3.max(data, d => d.value)])
  .nice()
  .range([height, 0]);

svg.append("g")
  .attr("transform", \`translate(0,\${height})\`)
  .call(d3.axisBottom(x))
  .selectAll("text").attr("fill", "#aaa");

svg.append("g")
  .call(d3.axisLeft(y).ticks(5))
  .selectAll("text").attr("fill", "#aaa");

svg.selectAll(".domain, .tick line").attr("stroke", "#444");

svg.selectAll("rect")
  .data(data)
  .join("rect")
  .attr("x", d => x(d.label))
  .attr("y", d => y(d.value))
  .attr("width", x.bandwidth())
  .attr("height", d => height - y(d.value))
  .attr("fill", "#f97316")
  .attr("rx", 3);
`,

      "scatter-plot": `const data = Array.from({ length: 50 }, () => ({
  x: Math.random() * 100,
  y: Math.random() * 100,
  r: Math.random() * 15 + 3,
}));

const margin = { top: 20, right: 20, bottom: 40, left: 50 };
const width = 560 - margin.left - margin.right;
const height = 360 - margin.top - margin.bottom;

const svg = d3.select("#preview")
  .append("svg")
  .attr("width", width + margin.left + margin.right)
  .attr("height", height + margin.top + margin.bottom)
  .append("g")
  .attr("transform", \`translate(\${margin.left},\${margin.top})\`);

const x = d3.scaleLinear().domain([0, 100]).range([0, width]);
const y = d3.scaleLinear().domain([0, 100]).range([height, 0]);
const color = d3.scaleSequential(d3.interpolateTurbo).domain([0, 100]);

svg.append("g")
  .attr("transform", \`translate(0,\${height})\`)
  .call(d3.axisBottom(x))
  .selectAll("text").attr("fill", "#aaa");

svg.append("g")
  .call(d3.axisLeft(y))
  .selectAll("text").attr("fill", "#aaa");

svg.selectAll(".domain, .tick line").attr("stroke", "#444");

svg.selectAll("circle")
  .data(data)
  .join("circle")
  .attr("cx", d => x(d.x))
  .attr("cy", d => y(d.y))
  .attr("r", d => d.r)
  .attr("fill", d => color(d.y))
  .attr("opacity", 0.7)
  .attr("stroke", "#fff")
  .attr("stroke-width", 0.5);
`,

      "line-chart": `const data = Array.from({ length: 30 }, (_, i) => ({
  date: new Date(2024, 0, i + 1),
  value: 50 + Math.sin(i * 0.5) * 30 + Math.random() * 10,
}));

const margin = { top: 20, right: 20, bottom: 30, left: 50 };
const width = 560 - margin.left - margin.right;
const height = 360 - margin.top - margin.bottom;

const svg = d3.select("#preview")
  .append("svg")
  .attr("width", width + margin.left + margin.right)
  .attr("height", height + margin.top + margin.bottom)
  .append("g")
  .attr("transform", \`translate(\${margin.left},\${margin.top})\`);

const x = d3.scaleTime()
  .domain(d3.extent(data, d => d.date))
  .range([0, width]);

const y = d3.scaleLinear()
  .domain([0, d3.max(data, d => d.value)])
  .nice()
  .range([height, 0]);

svg.append("g")
  .attr("transform", \`translate(0,\${height})\`)
  .call(d3.axisBottom(x).ticks(6))
  .selectAll("text").attr("fill", "#aaa");

svg.append("g")
  .call(d3.axisLeft(y))
  .selectAll("text").attr("fill", "#aaa");

svg.selectAll(".domain, .tick line").attr("stroke", "#444");

const line = d3.line()
  .x(d => x(d.date))
  .y(d => y(d.value))
  .curve(d3.curveMonotoneX);

svg.append("path")
  .datum(data)
  .attr("fill", "none")
  .attr("stroke", "#818cf8")
  .attr("stroke-width", 2.5)
  .attr("d", line);

svg.selectAll("circle")
  .data(data)
  .join("circle")
  .attr("cx", d => x(d.date))
  .attr("cy", d => y(d.value))
  .attr("r", 3)
  .attr("fill", "#818cf8");
`,

      "donut-chart": `const data = [
  { label: "React", value: 35 },
  { label: "Vue", value: 20 },
  { label: "Angular", value: 15 },
  { label: "Svelte", value: 12 },
  { label: "Other", value: 18 },
];

const width = 400;
const height = 400;
const radius = Math.min(width, height) / 2 - 20;

const svg = d3.select("#preview")
  .append("svg")
  .attr("width", width)
  .attr("height", height)
  .append("g")
  .attr("transform", \`translate(\${width / 2},\${height / 2})\`);

const color = d3.scaleOrdinal()
  .domain(data.map(d => d.label))
  .range(["#f97316", "#818cf8", "#4ade80", "#f472b6", "#facc15"]);

const pie = d3.pie()
  .value(d => d.value)
  .sort(null);

const arc = d3.arc()
  .innerRadius(radius * 0.55)
  .outerRadius(radius);

const arcs = svg.selectAll("g")
  .data(pie(data))
  .join("g");

arcs.append("path")
  .attr("d", arc)
  .attr("fill", d => color(d.data.label))
  .attr("stroke", "#0a0a0a")
  .attr("stroke-width", 2);

arcs.append("text")
  .attr("transform", d => \`translate(\${arc.centroid(d)})\`)
  .attr("text-anchor", "middle")
  .attr("fill", "#fff")
  .attr("font-size", "12px")
  .attr("font-weight", "600")
  .text(d => d.data.label);

svg.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", "-0.2em")
  .attr("fill", "#e5e5e5")
  .attr("font-size", "24px")
  .attr("font-weight", "700")
  .text("100%");

svg.append("text")
  .attr("text-anchor", "middle")
  .attr("dy", "1.2em")
  .attr("fill", "#888")
  .attr("font-size", "12px")
  .text("Frameworks");
`,

      "horizontal-bars": `const data = [
  { name: "JavaScript", pct: 65 },
  { name: "Python", pct: 48 },
  { name: "TypeScript", pct: 35 },
  { name: "Java", pct: 33 },
  { name: "C#", pct: 28 },
  { name: "PHP", pct: 21 },
  { name: "C++", pct: 20 },
  { name: "Go", pct: 14 },
].sort((a, b) => a.pct - b.pct);

const margin = { top: 10, right: 40, bottom: 30, left: 90 };
const width = 560 - margin.left - margin.right;
const height = 360 - margin.top - margin.bottom;

const svg = d3.select("#preview")
  .append("svg")
  .attr("width", width + margin.left + margin.right)
  .attr("height", height + margin.top + margin.bottom)
  .append("g")
  .attr("transform", \`translate(\${margin.left},\${margin.top})\`);

const x = d3.scaleLinear().domain([0, 70]).range([0, width]);
const y = d3.scaleBand()
  .domain(data.map(d => d.name))
  .range([height, 0])
  .padding(0.2);

svg.append("g")
  .attr("transform", \`translate(0,\${height})\`)
  .call(d3.axisBottom(x).ticks(5).tickFormat(d => d + "%"))
  .selectAll("text").attr("fill", "#aaa");

svg.append("g")
  .call(d3.axisLeft(y))
  .selectAll("text").attr("fill", "#aaa");

svg.selectAll(".domain, .tick line").attr("stroke", "#444");

svg.selectAll("rect")
  .data(data)
  .join("rect")
  .attr("x", 0)
  .attr("y", d => y(d.name))
  .attr("width", d => x(d.pct))
  .attr("height", y.bandwidth())
  .attr("fill", "#4ade80")
  .attr("rx", 3);

svg.selectAll(".label")
  .data(data)
  .join("text")
  .attr("x", d => x(d.pct) + 5)
  .attr("y", d => y(d.name) + y.bandwidth() / 2)
  .attr("dy", "0.35em")
  .attr("fill", "#aaa")
  .attr("font-size", "11px")
  .text(d => d.pct + "%");
`,

      "grouped-bars": `const data = [
  { category: "Q1", sales: 40, costs: 25 },
  { category: "Q2", sales: 55, costs: 30 },
  { category: "Q3", sales: 70, costs: 45 },
  { category: "Q4", sales: 60, costs: 35 },
];

const keys = ["sales", "costs"];
const colors = { sales: "#f97316", costs: "#818cf8" };

const margin = { top: 30, right: 20, bottom: 30, left: 40 };
const width = 560 - margin.left - margin.right;
const height = 360 - margin.top - margin.bottom;

const svg = d3.select("#preview")
  .append("svg")
  .attr("width", width + margin.left + margin.right)
  .attr("height", height + margin.top + margin.bottom)
  .append("g")
  .attr("transform", \`translate(\${margin.left},\${margin.top})\`);

const x0 = d3.scaleBand()
  .domain(data.map(d => d.category))
  .range([0, width])
  .padding(0.3);

const x1 = d3.scaleBand()
  .domain(keys)
  .range([0, x0.bandwidth()])
  .padding(0.05);

const y = d3.scaleLinear()
  .domain([0, d3.max(data, d => Math.max(d.sales, d.costs))])
  .nice()
  .range([height, 0]);

svg.append("g")
  .attr("transform", \`translate(0,\${height})\`)
  .call(d3.axisBottom(x0))
  .selectAll("text").attr("fill", "#aaa");

svg.append("g")
  .call(d3.axisLeft(y))
  .selectAll("text").attr("fill", "#aaa");

svg.selectAll(".domain, .tick line").attr("stroke", "#444");

const groups = svg.selectAll("g.group")
  .data(data)
  .join("g")
  .attr("class", "group")
  .attr("transform", d => \`translate(\${x0(d.category)},0)\`);

groups.selectAll("rect")
  .data(d => keys.map(key => ({ key, value: d[key] })))
  .join("rect")
  .attr("x", d => x1(d.key))
  .attr("y", d => y(d.value))
  .attr("width", x1.bandwidth())
  .attr("height", d => height - y(d.value))
  .attr("fill", d => colors[d.key])
  .attr("rx", 2);

// Legend
const legend = svg.selectAll(".legend")
  .data(keys)
  .join("g")
  .attr("transform", (d, i) => \`translate(\${i * 90}, -15)\`);

legend.append("rect")
  .attr("width", 12).attr("height", 12)
  .attr("fill", d => colors[d]).attr("rx", 2);

legend.append("text")
  .attr("x", 16).attr("y", 10)
  .attr("fill", "#aaa").attr("font-size", "11px")
  .text(d => d.charAt(0).toUpperCase() + d.slice(1));
`,

      "area-chart": `const data = Array.from({ length: 50 }, (_, i) => ({
  x: i,
  y: 30 + Math.sin(i * 0.3) * 20 + Math.random() * 8,
}));

const margin = { top: 20, right: 20, bottom: 30, left: 50 };
const width = 560 - margin.left - margin.right;
const height = 360 - margin.top - margin.bottom;

const svg = d3.select("#preview")
  .append("svg")
  .attr("width", width + margin.left + margin.right)
  .attr("height", height + margin.top + margin.bottom)
  .append("g")
  .attr("transform", \`translate(\${margin.left},\${margin.top})\`);

const x = d3.scaleLinear().domain([0, 49]).range([0, width]);
const y = d3.scaleLinear()
  .domain([0, d3.max(data, d => d.y)])
  .nice()
  .range([height, 0]);

svg.append("g")
  .attr("transform", \`translate(0,\${height})\`)
  .call(d3.axisBottom(x).ticks(6))
  .selectAll("text").attr("fill", "#aaa");

svg.append("g")
  .call(d3.axisLeft(y))
  .selectAll("text").attr("fill", "#aaa");

svg.selectAll(".domain, .tick line").attr("stroke", "#444");

const area = d3.area()
  .x(d => x(d.x))
  .y0(height)
  .y1(d => y(d.y))
  .curve(d3.curveMonotoneX);

const line = d3.line()
  .x(d => x(d.x))
  .y(d => y(d.y))
  .curve(d3.curveMonotoneX);

// Gradient
const defs = svg.append("defs");
const gradient = defs.append("linearGradient")
  .attr("id", "areaGrad")
  .attr("x1", "0%").attr("y1", "0%")
  .attr("x2", "0%").attr("y2", "100%");
gradient.append("stop")
  .attr("offset", "0%")
  .attr("stop-color", "#f472b6")
  .attr("stop-opacity", 0.4);
gradient.append("stop")
  .attr("offset", "100%")
  .attr("stop-color", "#f472b6")
  .attr("stop-opacity", 0.02);

svg.append("path")
  .datum(data)
  .attr("fill", "url(#areaGrad)")
  .attr("d", area);

svg.append("path")
  .datum(data)
  .attr("fill", "none")
  .attr("stroke", "#f472b6")
  .attr("stroke-width", 2)
  .attr("d", line);
`,

      "us-map": `// US Map using TopoJSON from CDN
// Note: topojson library loaded via CDN script tag approach
// In the sandbox we use fetch + d3.

const width = 600;
const height = 400;

const svg = d3.select("#preview")
  .append("svg")
  .attr("width", width)
  .attr("height", height);

const projection = d3.geoAlbersUsa()
  .scale(750)
  .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

// Load US TopoJSON from CDN
const url = "https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json";

d3.json(url).then(us => {
  // We need topojson - load it
  // topojson.feature converts TopoJSON to GeoJSON
  // Since we can't import topojson in eval, we do it manually:
  const states = topojsonFeature(us, us.objects.states);

  const color = d3.scaleSequential(d3.interpolateBlues)
    .domain([0, states.features.length]);

  svg.selectAll("path")
    .data(states.features)
    .join("path")
    .attr("d", path)
    .attr("fill", (d, i) => color(i))
    .attr("stroke", "#222")
    .attr("stroke-width", 0.5);
}).catch(err => {
  svg.append("text")
    .attr("x", width / 2)
    .attr("y", height / 2)
    .attr("text-anchor", "middle")
    .attr("fill", "#f97316")
    .text("Map requires network access for TopoJSON data");
});

// Simple topojson.feature implementation
function topojsonFeature(topology, object) {
  const arcs = topology.arcs;
  function arcToCoords(arcIdx) {
    let idx = arcIdx < 0 ? ~arcIdx : arcIdx;
    let arc = arcs[idx];
    let coords = [];
    let x = 0, y = 0;
    for (const [dx, dy] of arc) {
      x += dx; y += dy;
      const pt = topology.transform
        ? [x * topology.transform.scale[0] + topology.transform.translate[0],
           y * topology.transform.scale[1] + topology.transform.translate[1]]
        : [x, y];
      coords.push(pt);
    }
    if (arcIdx < 0) coords.reverse();
    return coords;
  }
  function ringToCoords(ring) {
    let coords = [];
    for (const arcIdx of ring) {
      const c = arcToCoords(arcIdx);
      coords = coords.concat(c.slice(coords.length ? 1 : 0));
    }
    return coords;
  }
  function geometryToFeature(geom) {
    if (geom.type === "Polygon") {
      return {
        type: "Feature",
        properties: geom.properties || {},
        id: geom.id,
        geometry: { type: "Polygon", coordinates: geom.arcs.map(ringToCoords) }
      };
    } else if (geom.type === "MultiPolygon") {
      return {
        type: "Feature",
        properties: geom.properties || {},
        id: geom.id,
        geometry: {
          type: "MultiPolygon",
          coordinates: geom.arcs.map(polygon => polygon.map(ringToCoords))
        }
      };
    }
    return { type: "Feature", properties: {}, geometry: geom };
  }
  if (object.type === "GeometryCollection") {
    return {
      type: "FeatureCollection",
      features: object.geometries.map(geometryToFeature)
    };
  }
  return geometryToFeature(object);
}
`,
    };

    const editor = document.getElementById("code-editor");
    const preview = document.getElementById("preview");
    const errorBanner = document.getElementById("error-banner");
    const templateSelect = document.getElementById("template-select");
    const resetBtn = document.getElementById("reset-btn");
    const runBtn = document.getElementById("run-btn");

    let debounceTimer;

    function loadTemplate(name) {
      editor.value = templates[name] || templates["empty"];
      runCode();
    }

    function runCode() {
      preview.innerHTML = "";
      errorBanner.style.display = "none";
      errorBanner.textContent = "";

      try {
        const code = editor.value;
        const fn = new Function("d3", "preview", code);
        fn(d3, preview);
      } catch (err) {
        errorBanner.textContent = err.message;
        errorBanner.style.display = "block";
      }
    }

    editor.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(runCode, 300);
    });

    editor.addEventListener("keydown", (e) => {
      if (e.key === "Tab") {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + "  " + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
      }
    });

    templateSelect.addEventListener("change", () => {
      loadTemplate(templateSelect.value);
    });

    resetBtn.addEventListener("click", () => {
      loadTemplate(templateSelect.value);
    });

    runBtn.addEventListener("click", runCode);

    // Resize handle
    const handle = document.getElementById("resize-handle");
    const editorPane = document.getElementById("editor-pane");
    const previewPane = document.getElementById("preview-pane");
    let isResizing = false;

    handle.addEventListener("mousedown", () => { isResizing = true; });
    document.addEventListener("mousemove", (e) => {
      if (!isResizing) return;
      const container = document.querySelector(".panes");
      const rect = container.getBoundingClientRect();
      const pct = ((e.clientX - rect.left) / rect.width) * 100;
      if (pct > 20 && pct < 80) {
        editorPane.style.width = pct + "%";
        previewPane.style.width = (100 - pct) + "%";
      }
    });
    document.addEventListener("mouseup", () => { isResizing = false; });

    // Initial load
    loadTemplate("bar-chart");
  </script>
</body>
</html>
