<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 06 - Interactive Dashboard Element</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/base.css">
  <style>
    body { padding: 2rem; }
    h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    h1 span { color: #f97316; }
    p { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    #chart { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 1.5rem; }
    svg { background: #1a1a1a; border-radius: 4px; }
    .controls { margin-bottom: 1rem; }
    .controls button {
      background: #f97316; color: #000; border: none; padding: 0.4rem 1rem;
      border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin: 0.25rem; font-weight: 600;
    }
    .controls button.secondary { background: #818cf8; }
    #detail-panel {
      background: #141414; border: 1px solid #222; border-radius: 8px;
      padding: 1.5rem; margin-top: 1rem; min-height: 60px;
    }
    #detail-panel h3 { color: #f97316; font-size: 1rem; margin-bottom: 0.5rem; }
    #detail-panel p { color: #bbb; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Exercise <span>06</span>: Interactive Dashboard Element</h1>
  <p>City budget with transitions, tooltips, click-to-highlight, and sort.</p>
  <div class="controls">
    <button id="btn-sort">Sort by Budget</button>
    <button id="btn-random" class="secondary">Randomize Data</button>
  </div>
  <div id="chart"></div>
  <div id="detail-panel">
    <h3>Department Details</h3>
    <p>Click a bar to see department details here.</p>
  </div>
  <script type="module" src="/components/init-tutor.js"></script>
  <script type="module" src="06-exercise.js"></script>
</body>
</html>
