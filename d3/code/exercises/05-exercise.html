<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 05 - Interactive US Map</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #e5e5e5; padding: 2rem; }
    h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    h1 span { color: #f97316; }
    p { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    #chart { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 1.5rem; }
    svg { background: #1a1a1a; border-radius: 4px; }
    #detail-panel {
      background: #141414; border: 1px solid #222; border-radius: 8px;
      padding: 1.5rem; margin-top: 1rem; min-height: 60px;
    }
    #detail-panel h3 { color: #f97316; font-size: 1rem; margin-bottom: 0.5rem; }
    #detail-panel p { color: #bbb; }
  </style>
</head>
<body>
  <h1>Exercise <span>05</span>: Interactive US State Map</h1>
  <p>Click a state to see its details. Hover for tooltip. Colored by population.</p>
  <div id="chart"></div>
  <div id="detail-panel">
    <h3>State Details</h3>
    <p>Click a state on the map to see its data here.</p>
  </div>
  <script type="module" src="/components/init-tutor.js"></script>
  <script type="module" src="05-exercise.js"></script>
</body>
</html>
