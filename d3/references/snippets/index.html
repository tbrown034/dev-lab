<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snippet Library - Learn D3</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/assets/base.css">
  <style>
    .header {
      padding: 1.5rem 3rem;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.3rem; font-weight: 600; }
    .header h1 span { color: #f97316; }
    .header .links { display: flex; gap: 1rem; }
    .header .links a {
      color: #888; text-decoration: none; font-size: 0.85rem;
      transition: color 0.2s;
    }
    .header .links a:hover { color: #f97316; }

    .search-bar {
      padding: 1rem 3rem;
      border-bottom: 1px solid #222;
      background: #111;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .search-bar input {
      width: 100%;
      max-width: 500px;
      background: #1a1a1a;
      color: #e5e5e5;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      outline: none;
    }
    .search-bar input:focus { border-color: #f97316; }
    .search-bar input::placeholder { color: #555; }

    .category-nav {
      padding: 0.75rem 3rem;
      border-bottom: 1px solid #222;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      background: #0e0e0e;
      position: sticky;
      top: 52px;
      z-index: 9;
    }
    .category-nav button {
      padding: 0.35rem 0.75rem;
      background: #1a1a1a;
      color: #888;
      border: 1px solid #333;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .category-nav button:hover,
    .category-nav button.active {
      background: #f97316;
      color: #000;
      border-color: #f97316;
    }

    .main {
      padding: 2rem 3rem;
      max-width: 900px;
    }
    .category-section {
      margin-bottom: 2.5rem;
    }
    .category-section h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #f97316;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #222;
    }

    .snippet {
      background: #141414;
      border: 1px solid #222;
      border-radius: 8px;
      margin-bottom: 1rem;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .snippet:hover { border-color: #333; }
    .snippet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1a1a1a;
    }
    .snippet-title {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .copy-btn {
      background: #1a1a1a;
      color: #888;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: #4ade80;
      color: #000;
      border-color: #4ade80;
    }
    .copy-btn.copied {
      background: #4ade80;
      color: #000;
      border-color: #4ade80;
    }
    .snippet-code {
      padding: 1rem;
      overflow-x: auto;
    }
    .snippet-code pre {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12.5px;
      line-height: 1.6;
      color: #c5c5c5;
      white-space: pre;
    }
    .snippet-desc {
      padding: 0.6rem 1rem;
      border-top: 1px solid #1a1a1a;
      color: #888;
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .no-results {
      color: #555;
      font-size: 0.9rem;
      padding: 2rem 0;
      text-align: center;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Snippet <span>Library</span></h1>
    <div class="links">
      <a href="/d3/">Home</a>
      <a href="/d3/code/sandbox/">Sandbox</a>
      <a href="/d3/code/sandbox/debugger.html">Debugger</a>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search snippets... (e.g. 'scaleBand', 'tooltip', 'margin')">
  </div>

  <div class="category-nav" id="category-nav">
    <button class="active" data-cat="all">All</button>
  </div>

  <div class="main" id="main">
    <div id="no-results" class="no-results hidden">No snippets match your search.</div>
  </div>

  <script>
    const snippets = [
      // ---- SETUP ----
      {
        category: "Setup",
        title: "Margins Convention Boilerplate",
        code: `const margin = { top: 20, right: 20, bottom: 40, left: 50 };
const width = 700 - margin.left - margin.right;
const height = 400 - margin.top - margin.bottom;

const svg = d3.select("#chart")
  .append("svg")
  .attr("width", width + margin.left + margin.right)
  .attr("height", height + margin.top + margin.bottom)
  .append("g")
  .attr("transform", \`translate(\${margin.left},\${margin.top})\`);

// All drawing happens inside 'svg' (the <g> group)
// Axes go at: x-axis translate(0, height), y-axis at origin`,
        desc: "The standard D3 margin convention. Define margins, compute inner dimensions, create an SVG with a translated group. Nearly every D3 chart starts this way."
      },
      {
        category: "Setup",
        title: "Responsive SVG with viewBox",
        code: `const svg = d3.select("#chart")
  .append("svg")
  .attr("viewBox", "0 0 700 400")
  .attr("preserveAspectRatio", "xMidYMid meet")
  .style("width", "100%")
  .style("height", "auto");

// The SVG scales to fit its container
// Internal coordinates stay 0-700 x 0-400`,
        desc: "Use viewBox instead of fixed width/height to make SVGs responsive. The chart will scale to fill its container while maintaining aspect ratio."
      },
      {
        category: "Setup",
        title: "Basic SVG Container",
        code: `const svg = d3.select("#chart")
  .append("svg")
  .attr("width", 600)
  .attr("height", 400)
  .style("background", "#1a1a1a");`,
        desc: "The simplest possible SVG container. Good for quick experiments, but prefer the margins convention for real charts."
      },

      // ---- SCALES ----
      {
        category: "Scales",
        title: "scaleLinear",
        code: `const y = d3.scaleLinear()
  .domain([0, d3.max(data, d => d.value)])  // data space
  .nice()                                     // round to clean numbers
  .range([height, 0]);                        // pixel space (inverted for y!)

// Usage:
// y(0) => height (bottom)
// y(maxValue) => 0 (top)`,
        desc: "Maps a continuous numeric domain to a continuous pixel range. The most common scale. Use .nice() to round domain endpoints to clean numbers."
      },
      {
        category: "Scales",
        title: "scaleBand",
        code: `const x = d3.scaleBand()
  .domain(data.map(d => d.category))  // array of category names
  .range([0, width])                   // pixel range
  .padding(0.2);                       // gap between bands (0-1)

// Usage:
// x("CategoryA") => pixel position
// x.bandwidth()  => width of each band`,
        desc: "Maps discrete categories to equal-width bands. Essential for bar charts. The padding parameter controls the gap between bars (0 = no gap, 1 = all gap)."
      },
      {
        category: "Scales",
        title: "scaleTime",
        code: `const x = d3.scaleTime()
  .domain(d3.extent(data, d => d.date))  // [minDate, maxDate]
  .range([0, width]);

// Parse dates if they're strings:
const parseDate = d3.timeParse("%Y-%m-%d");
data.forEach(d => d.date = parseDate(d.dateStr));

// Format for display:
const formatDate = d3.timeFormat("%b %d");
// formatDate(new Date(2024, 0, 15)) => "Jan 15"`,
        desc: "Maps Date objects to pixels. Use d3.timeParse to convert strings to dates, and d3.timeFormat for display. Works with axisBottom for automatic date tick formatting."
      },
      {
        category: "Scales",
        title: "scaleSequential (Color)",
        code: `// Single-hue sequential
const color = d3.scaleSequential(d3.interpolateBlues)
  .domain([0, maxValue]);

// Other interpolators:
// d3.interpolateReds, d3.interpolateGreens
// d3.interpolateViridis, d3.interpolateTurbo
// d3.interpolateWarm, d3.interpolateCool

// Diverging (two-color):
const diverging = d3.scaleDiverging(d3.interpolateRdBu)
  .domain([minVal, 0, maxVal]);

// Usage: color(42) => "rgb(..."`,
        desc: "Maps a number to a color using built-in color interpolators. Great for choropleth maps and heatmaps. Diverging scales highlight deviation from a midpoint."
      },
      {
        category: "Scales",
        title: "scaleOrdinal (Categorical Colors)",
        code: `const color = d3.scaleOrdinal()
  .domain(["A", "B", "C", "D"])
  .range(["#f97316", "#818cf8", "#4ade80", "#f472b6"]);

// Or use built-in schemes:
const color2 = d3.scaleOrdinal(d3.schemeTableau10);
// d3.schemeCategory10, d3.schemePastel1, etc.

// Usage: color("A") => "#f97316"`,
        desc: "Maps discrete categories to colors. Use built-in schemes for quick, well-designed palettes. d3.schemeTableau10 is the most popular choice."
      },

      // ---- AXES ----
      {
        category: "Axes",
        title: "axisBottom + axisLeft",
        code: `// X axis (bottom)
svg.append("g")
  .attr("transform", \`translate(0,\${height})\`)
  .call(d3.axisBottom(xScale));

// Y axis (left)
svg.append("g")
  .call(d3.axisLeft(yScale));`,
        desc: "Create axes from scales. axisBottom renders ticks below the line (for x-axis at bottom), axisLeft renders ticks to the left (for y-axis on left side). Must translate x-axis down to height."
      },
      {
        category: "Axes",
        title: "Custom Tick Formatting",
        code: `// Number formatting
d3.axisLeft(y)
  .ticks(5)                              // suggest 5 ticks
  .tickFormat(d => \`$\${d / 1000}k\`)      // "$40k"

// Date formatting
d3.axisBottom(x)
  .ticks(d3.timeMonth.every(1))          // one tick per month
  .tickFormat(d3.timeFormat("%b '%y"))    // "Jan '24"

// Percentage
d3.axisLeft(y)
  .tickFormat(d3.format(".0%"))          // "45%"

// SI prefix
d3.axisLeft(y)
  .tickFormat(d3.format(".2s"))          // "1.5M", "300k"`,
        desc: "Customize tick count and label format. D3 provides d3.format for numbers and d3.timeFormat for dates. You can also pass any function that takes a value and returns a string."
      },
      {
        category: "Axes",
        title: "Rotated Tick Labels",
        code: `svg.append("g")
  .attr("transform", \`translate(0,\${height})\`)
  .call(d3.axisBottom(x))
  .selectAll("text")
  .attr("transform", "rotate(-45)")
  .attr("text-anchor", "end")
  .attr("dx", "-0.5em")
  .attr("dy", "0.15em");`,
        desc: "Rotate x-axis labels to prevent overlap when you have many categories. -45 degrees is standard. Adjust dx/dy to fine-tune positioning after rotation."
      },
      {
        category: "Axes",
        title: "Grid Lines",
        code: `// Horizontal grid lines (from y-axis)
svg.append("g")
  .attr("class", "grid")
  .call(d3.axisLeft(y)
    .ticks(5)
    .tickSize(-width)    // extend ticks across the full width
    .tickFormat("")       // hide labels (real axis handles those)
  )
  .selectAll("line")
  .attr("stroke", "#333")
  .attr("stroke-dasharray", "3,3");

// Remove the domain line
svg.selectAll(".grid .domain").remove();`,
        desc: "Create grid lines by making an axis with extended ticks and no labels. Use negative tickSize to extend lines across the chart area."
      },

      // ---- SHAPES ----
      {
        category: "Shapes",
        title: "Bar Chart Complete",
        code: `const data = [
  { label: "A", value: 30 },
  { label: "B", value: 80 },
  { label: "C", value: 45 },
];

const margin = { top: 20, right: 20, bottom: 30, left: 40 };
const width = 500 - margin.left - margin.right;
const height = 300 - margin.top - margin.bottom;

const svg = d3.select("#chart").append("svg")
  .attr("viewBox", \`0 0 \${width + margin.left + margin.right} \${height + margin.top + margin.bottom}\`)
  .append("g")
  .attr("transform", \`translate(\${margin.left},\${margin.top})\`);

const x = d3.scaleBand()
  .domain(data.map(d => d.label))
  .range([0, width]).padding(0.2);

const y = d3.scaleLinear()
  .domain([0, d3.max(data, d => d.value)]).nice()
  .range([height, 0]);

svg.append("g").attr("transform", \`translate(0,\${height})\`).call(d3.axisBottom(x));
svg.append("g").call(d3.axisLeft(y));

svg.selectAll("rect")
  .data(data)
  .join("rect")
  .attr("x", d => x(d.label))
  .attr("y", d => y(d.value))
  .attr("width", x.bandwidth())
  .attr("height", d => height - y(d.value))
  .attr("fill", "#f97316");`,
        desc: "Complete vertical bar chart with margins, scales, and axes. The most common D3 pattern."
      },
      {
        category: "Shapes",
        title: "Horizontal Bar Chart",
        code: `const x = d3.scaleLinear()
  .domain([0, d3.max(data, d => d.value)]).nice()
  .range([0, width]);

const y = d3.scaleBand()
  .domain(data.map(d => d.label))
  .range([0, height]).padding(0.2);

svg.append("g").attr("transform", \`translate(0,\${height})\`).call(d3.axisBottom(x));
svg.append("g").call(d3.axisLeft(y));

svg.selectAll("rect")
  .data(data)
  .join("rect")
  .attr("x", 0)
  .attr("y", d => y(d.label))
  .attr("width", d => x(d.value))
  .attr("height", y.bandwidth())
  .attr("fill", "#818cf8");`,
        desc: "Swap the scales: scaleBand on y, scaleLinear on x. Bars grow rightward from x=0."
      },
      {
        category: "Shapes",
        title: "Line Chart with d3.line()",
        code: `const line = d3.line()
  .x(d => xScale(d.date))
  .y(d => yScale(d.value))
  .curve(d3.curveMonotoneX);  // smooth curve

// Render the line
svg.append("path")
  .datum(data)              // datum, not data (single path)
  .attr("fill", "none")
  .attr("stroke", "#818cf8")
  .attr("stroke-width", 2)
  .attr("d", line);

// Optional: add dots
svg.selectAll("circle")
  .data(data)
  .join("circle")
  .attr("cx", d => xScale(d.date))
  .attr("cy", d => yScale(d.value))
  .attr("r", 3)
  .attr("fill", "#818cf8");`,
        desc: "d3.line() generates a path string from data. Use .datum() (not .data()) since it is one path from many points. Curves: curveLinear, curveMonotoneX, curveBasis, curveStep."
      },
      {
        category: "Shapes",
        title: "Area Chart with d3.area()",
        code: `const area = d3.area()
  .x(d => xScale(d.date))
  .y0(height)              // baseline (bottom)
  .y1(d => yScale(d.value))  // top edge
  .curve(d3.curveMonotoneX);

svg.append("path")
  .datum(data)
  .attr("fill", "#818cf833")
  .attr("d", area);

// Add a line on top
const line = d3.line()
  .x(d => xScale(d.date))
  .y(d => yScale(d.value))
  .curve(d3.curveMonotoneX);

svg.append("path")
  .datum(data)
  .attr("fill", "none")
  .attr("stroke", "#818cf8")
  .attr("stroke-width", 2)
  .attr("d", line);`,
        desc: "d3.area() generates a filled region. y0 is the baseline (usually bottom), y1 is the top edge. Often combined with a line on top for clarity."
      },
      {
        category: "Shapes",
        title: "Donut Chart with d3.arc() + d3.pie()",
        code: `const data = [
  { label: "A", value: 30 },
  { label: "B", value: 50 },
  { label: "C", value: 20 },
];

const radius = Math.min(width, height) / 2;
const color = d3.scaleOrdinal(d3.schemeTableau10);

const pie = d3.pie()
  .value(d => d.value)
  .sort(null);            // keep original order

const arc = d3.arc()
  .innerRadius(radius * 0.5)  // 0 for full pie
  .outerRadius(radius);

const g = svg.append("g")
  .attr("transform", \`translate(\${width/2},\${height/2})\`);

g.selectAll("path")
  .data(pie(data))
  .join("path")
  .attr("d", arc)
  .attr("fill", d => color(d.data.label))
  .attr("stroke", "#0a0a0a")
  .attr("stroke-width", 2);`,
        desc: "d3.pie() computes start/end angles from values. d3.arc() generates path strings from those angles. Set innerRadius > 0 for a donut, 0 for a full pie."
      },
      {
        category: "Shapes",
        title: "Scatter Plot",
        code: `svg.selectAll("circle")
  .data(data)
  .join("circle")
  .attr("cx", d => xScale(d.x))
  .attr("cy", d => yScale(d.y))
  .attr("r", d => sizeScale(d.size))  // or fixed: .attr("r", 5)
  .attr("fill", d => colorScale(d.category))
  .attr("opacity", 0.7)
  .attr("stroke", "#fff")
  .attr("stroke-width", 0.5);

// Useful scales for scatter plots:
// const sizeScale = d3.scaleSqrt().domain([0, max]).range([2, 20]);
// const colorScale = d3.scaleOrdinal(d3.schemeTableau10);`,
        desc: "Map x/y data to circle cx/cy with linear scales. Use scaleSqrt for bubble size (area perception is proportional to the square root). Add slight opacity to handle overlap."
      },

      // ---- MAPS ----
      {
        category: "Maps",
        title: "Load TopoJSON + Render US States",
        code: `import * as topojson from "topojson-client";

const width = 960, height = 600;

const projection = d3.geoAlbersUsa()
  .scale(1200)
  .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

const svg = d3.select("#map").append("svg")
  .attr("viewBox", \`0 0 \${width} \${height}\`);

// Load TopoJSON
d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json")
  .then(us => {
    const states = topojson.feature(us, us.objects.states);

    svg.selectAll("path")
      .data(states.features)
      .join("path")
      .attr("d", path)
      .attr("fill", "#1a1a1a")
      .attr("stroke", "#444");
  });`,
        desc: "Standard US map pattern: geoAlbersUsa projection, geoPath generator, TopoJSON data from CDN. topojson.feature() converts TopoJSON to GeoJSON. Install topojson-client: npm i topojson-client."
      },
      {
        category: "Maps",
        title: "Choropleth with Color Scale",
        code: `// Assume: stateData is a Map of stateId => value
const stateData = new Map(csvData.map(d => [d.id, +d.rate]));

const color = d3.scaleQuantize()
  .domain([0, d3.max(csvData, d => +d.rate)])
  .range(d3.schemeBlues[9]);  // 9-step blue palette

svg.selectAll("path")
  .data(states.features)
  .join("path")
  .attr("d", path)
  .attr("fill", d => {
    const val = stateData.get(d.id);
    return val != null ? color(val) : "#333";
  })
  .attr("stroke", "#444")
  .attr("stroke-width", 0.5);

// Add a legend
const legendScale = d3.scaleLinear()
  .domain(color.domain())
  .range([0, 200]);`,
        desc: "Color each state by a data value. scaleQuantize splits a continuous domain into discrete color buckets. Join your CSV data to geo features by state ID."
      },
      {
        category: "Maps",
        title: "Add Points to Map",
        code: `const cities = [
  { name: "NYC", lat: 40.71, lon: -74.01, pop: 8336 },
  { name: "LA", lat: 34.05, lon: -118.24, pop: 3979 },
  { name: "Chicago", lat: 41.88, lon: -87.63, pop: 2693 },
];

const rScale = d3.scaleSqrt()
  .domain([0, d3.max(cities, d => d.pop)])
  .range([3, 15]);

svg.selectAll("circle")
  .data(cities)
  .join("circle")
  .attr("cx", d => projection([d.lon, d.lat])[0])
  .attr("cy", d => projection([d.lon, d.lat])[1])
  .attr("r", d => rScale(d.pop))
  .attr("fill", "#f9731699")
  .attr("stroke", "#f97316");`,
        desc: "Plot lat/lon points on a map. Use the same projection to convert [longitude, latitude] to [x, y] pixels. Use scaleSqrt for bubble size to make area proportional to value."
      },

      // ---- TRANSITIONS ----
      {
        category: "Transitions",
        title: "Basic Transition",
        code: `// Transition existing elements
svg.selectAll("rect")
  .transition()
  .duration(800)
  .ease(d3.easeCubicOut)  // easing function
  .attr("y", d => y(d.value))
  .attr("height", d => height - y(d.value))
  .attr("fill", "#f97316");

// Common easings:
// d3.easeLinear, d3.easeCubicOut, d3.easeBounce
// d3.easeElastic, d3.easeBack`,
        desc: "Interpolates attributes over time. Chain .transition() before .attr() calls. Duration is in milliseconds. Easing controls the acceleration curve."
      },
      {
        category: "Transitions",
        title: "Staggered Entrance Animation",
        code: `svg.selectAll("rect")
  .data(data)
  .join("rect")
  .attr("x", d => x(d.label))
  .attr("width", x.bandwidth())
  .attr("y", height)           // start at bottom
  .attr("height", 0)           // start with no height
  .attr("fill", "#f97316")
  .transition()
  .duration(600)
  .delay((d, i) => i * 80)     // stagger by index
  .attr("y", d => y(d.value))
  .attr("height", d => height - y(d.value));`,
        desc: "Bars grow up from the bottom, one after another. Set initial state (y=height, height=0), then transition to final state. The delay function staggers each bar by 80ms."
      },
      {
        category: "Transitions",
        title: "Enter/Exit Transitions with .join() Callbacks",
        code: `svg.selectAll("rect")
  .data(newData, d => d.id)  // key function for identity
  .join(
    enter => enter.append("rect")
      .attr("fill", "#4ade80")
      .attr("y", height)
      .attr("height", 0)
      .call(enter => enter.transition().duration(500)
        .attr("y", d => y(d.value))
        .attr("height", d => height - y(d.value))
      ),
    update => update
      .call(update => update.transition().duration(500)
        .attr("y", d => y(d.value))
        .attr("height", d => height - y(d.value))
        .attr("fill", "#818cf8")
      ),
    exit => exit
      .call(exit => exit.transition().duration(300)
        .attr("y", height)
        .attr("height", 0)
        .attr("fill", "#f472b6")
        .remove()
      )
  )
  .attr("x", d => x(d.label))
  .attr("width", x.bandwidth());`,
        desc: "Full enter/update/exit with animations. New bars slide up in green, updated bars animate to new values in blue, removed bars slide down in pink then disappear. Use a key function for stable identity."
      },

      // ---- EVENTS ----
      {

  .attr("class", "tooltip")
  .style("position", "absolute")
  .style("background", "#1a1a1a")
  .style("border", "1px solid #333")
  .style("border-radius", "4px")
  .style("padding", "8px 12px")

  .style("pointer-events", "none")
  .style("opacity", 0);

// Attach to elements

  .on("mouseover", (event, d) => {
    tooltip.transition().duration(150).style("opacity", 1);

  })
  .on("mouseout", () => {
    tooltip.transition().duration(300).style("opacity", 0);
  });`,
        desc: "The most reliable tooltip approach: an absolute-positioned HTML div. Use event.pageX/pageY for position. Set pointer-events: none so the tooltip does not interfere with mouse events."

      // ---- REACT ----
      {
        category: "React",
        title: "useRef + useEffect D3 Pattern",
        code: `import { useRef, useEffect } from "react";
import * as d3 from "d3";

function BarChart({ data, width = 500, height = 300 }) {
  const svgRef = useRef();

  useEffect(() => {
    const svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();  // clear previous render

    const x = d3.scaleBand()
      .domain(data.map(d => d.label))
      .range([0, width]).padding(0.2);

    const y = d3.scaleLinear()
      .domain([0, d3.max(data, d => d.value)])
      .range([height, 0]);

    svg.selectAll("rect")
      .data(data)
      .join("rect")
      .attr("x", d => x(d.label))
      .attr("y", d => y(d.value))
      .attr("width", x.bandwidth())
      .attr("height", d => height - y(d.value))
      .attr("fill", "#f97316");
  }, [data, width, height]);

  return <svg ref={svgRef} width={width} height={height} />;
}`,
        desc: "The standard pattern: React owns the SVG element, D3 draws inside it via useEffect. Clear previous content with selectAll('*').remove(). List data/dimensions in the dependency array."
      },
      {
        category: "React",
        title: "D3 Scales in React (No D3 DOM)",
        code: `import * as d3 from "d3";

function BarChart({ data, width = 500, height = 300 }) {
  const x = d3.scaleBand()
    .domain(data.map(d => d.label))
    .range([0, width]).padding(0.2);

  const y = d3.scaleLinear()
    .domain([0, d3.max(data, d => d.value)])
    .range([height, 0]);

  return (
    <svg width={width} height={height}>
      {data.map(d => (
        <rect
          key={d.label}
          x={x(d.label)}
          y={y(d.value)}
          width={x.bandwidth()}
          height={height - y(d.value)}
          fill="#f97316"
        />
      ))}
    </svg>
  );
}`,
        desc: "Use D3 only for math (scales, layouts, shapes), let React handle the DOM. This is the 'React-first' approach -- better for React devs who want D3's calculations without D3's DOM manipulation."
      },
    ];

    // ---- Render ----
    const main = document.getElementById("main");
    const search = document.getElementById("search");
    const catNav = document.getElementById("category-nav");
    const noResults = document.getElementById("no-results");

    const categories = [...new Set(snippets.map(s => s.category))];
    let activeCategory = "all";

    // Build category nav
    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.textContent = cat;
      btn.dataset.cat = cat;
      catNav.appendChild(btn);
    });

    // Build snippet elements
    const snippetEls = [];
    let currentCategorySection = null;
    let currentCategoryName = null;

    categories.forEach(cat => {
      const section = document.createElement("div");
      section.className = "category-section";
      section.dataset.category = cat;
      const h2 = document.createElement("h2");
      h2.textContent = cat;
      section.appendChild(h2);

      snippets.filter(s => s.category === cat).forEach(s => {
        const div = document.createElement("div");
        div.className = "snippet";
        div.dataset.searchText = `${s.title} ${s.category} ${s.code} ${s.desc}`.toLowerCase();
        div.innerHTML = `
          <div class="snippet-header">
            <div class="snippet-title">${s.title}</div>
            <button class="copy-btn" data-code="${encodeURIComponent(s.code)}">Copy</button>
          </div>
          <div class="snippet-code"><pre>${escapeHtml(s.code)}</pre></div>
          <div class="snippet-desc">${s.desc}</div>
        `;
        section.appendChild(div);
        snippetEls.push({ el: div, section, category: cat });
      });

      main.appendChild(section);
    });

    function escapeHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Copy button
    main.addEventListener("click", (e) => {
      if (e.target.classList.contains("copy-btn")) {
        const code = decodeURIComponent(e.target.dataset.code);
        navigator.clipboard.writeText(code).then(() => {
          e.target.textContent = "Copied!";
          e.target.classList.add("copied");
          setTimeout(() => {
            e.target.textContent = "Copy";
            e.target.classList.remove("copied");
          }, 1500);
        });
      }
    });

    // Search
    search.addEventListener("input", () => {
      const q = search.value.toLowerCase().trim();
      filterSnippets(q, activeCategory);
    });

    // Category nav
    catNav.addEventListener("click", (e) => {
      if (e.target.tagName !== "BUTTON") return;
      catNav.querySelectorAll("button").forEach(b => b.classList.remove("active"));
      e.target.classList.add("active");
      activeCategory = e.target.dataset.cat;
      filterSnippets(search.value.toLowerCase().trim(), activeCategory);
    });

    function filterSnippets(query, category) {
      let anyVisible = false;
      const visibleCategories = new Set();

      snippetEls.forEach(({ el, section, category: cat }) => {
        const matchesCat = category === "all" || cat === category;
        const matchesQuery = !query || el.dataset.searchText.includes(query);
        const visible = matchesCat && matchesQuery;
        el.classList.toggle("hidden", !visible);
        if (visible) {
          anyVisible = true;
          visibleCategories.add(cat);
        }
      });

      // Show/hide category sections
      document.querySelectorAll(".category-section").forEach(sec => {
        sec.classList.toggle("hidden", !visibleCategories.has(sec.dataset.category));
      });

      noResults.classList.toggle("hidden", anyVisible);
    }
  </script>
  <script type="module" src="/components/init-tutor.js"></script>
